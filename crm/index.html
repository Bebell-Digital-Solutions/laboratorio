    /* Custom Scrollbar */

    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

    /* Confetti Animation */
    .confetti-piece {
      position: absolute;
      top: -20px;
      width: 8px;
      height: 16px;
      border-radius: 2px;
      animation-name: fall;
      animation-timing-function: cubic-bezier(0.25, 0.46, 0.45, 0.94);
      animation-fill-mode: forwards;
    }
    @keyframes fall {
      0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
      100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
    }

    /* Toast Animation */
    @keyframes slideInRight {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
    .toast-enter { animation: slideInRight 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
    
    @keyframes slideUpFade {
      from { transform: translate(-50%, 100%); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
    .bulk-bar-enter { animation: slideUpFade 0.3s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

        if (start === end) { setCount(end); return; }
        
        const duration = 1000;
        const incrementTime = Math.max(10, Math.abs(Math.floor(duration / (end - start))));
        const timer = setInterval(() => {
          start += 1;
          setCount(start);
          if (start === end) clearInterval(timer);
        }, incrementTime);
        return () => clearInterval(timer);
      }, [value]);
      return <span>{count}</span>;

                        <button type="button" onClick={() => setShowGallery(true)} className="flex items-center justify-center p-2.5 bg-gray-50 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors" title="Gallery">

                        <label className="flex items-center justify-center p-2.5 bg-gray-50 border border-gray-200 rounded-lg cursor-pointer hover:bg-gray-100 transition-colors" title="Upload Image">

                          <input type="file" accept="image/*" className="hidden" onChange={(e) => {

                      {formData.bannerUrl && (

                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Tags (Drag to reorder)</label>
                      <div className="flex gap-2 mb-2">
                        <input type="text" value={newTag} onChange={(e) => setNewTag(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter') { e.preventDefault(); handleAddTag(); } }} className="flex-1 px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none" placeholder="Add tag..." />
                        <button type="button" onClick={handleAddTag} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors">Add</button>
                      </div>
                      <div className="flex flex-wrap gap-2">
                        {tagsArray.map((tag, idx) => (
                           <div 
                             key={tag}
                             draggable
                             onDragStart={(e) => { setDraggedTagIdx(idx); e.currentTarget.style.opacity = '0.5'; }}
                             onDragEnd={(e) => { setDraggedTagIdx(null); e.currentTarget.style.opacity = '1'; }}
                             onDragOver={(e) => e.preventDefault()}
                             onDrop={(e) => {
                               e.preventDefault();
                               if (draggedTagIdx === null || draggedTagIdx === idx) return;
                               const newTags = [...tagsArray];
                               const item = newTags.splice(draggedTagIdx, 1)[0];
                               newTags.splice(idx, 0, item);
                               setTagsArray(newTags);
                             }}
                             className="flex items-center gap-1.5 px-2.5 py-1 text-xs font-medium bg-primary/10 text-primary border border-primary/20 rounded cursor-move select-none hover:bg-primary/20 transition-colors"
                           >
                             <IcoGripVertical className="w-3 h-3 opacity-50" />
                             {tag}
                             <button type="button" onClick={() => removeTag(idx)} className="hover:text-rose-500 p-0.5 rounded-full"><IcoX className="w-3 h-3" /></button>
                           </div>
                        ))}
                      </div>
                    </div>

                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">Attached Receipt</label>
                      <select name="receiptId" value={formData.receiptId} onChange={handleChange} className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none">
                        <option value="">-- Select Receipt --</option>
                        {receipts.map(r => <option key={r.id} value={r.id}>{r.name}</option>)}
                      </select>
                    </div>
                  </div>
                </div>

                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">Description</label>
                  <textarea name="description" value={formData.description} onChange={handleChange} rows="3" className="w-full px-4 py-2 border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none resize-none" placeholder="Project details..."></textarea>
                </div>

                <div className="p-5 bg-gray-50 border border-gray-100 rounded-xl">
                  <h3 className="text-sm font-bold text-title mb-4 flex items-center gap-1.5"><IcoZap className="w-4 h-4 text-amber-500" /> Custom Fields & Properties</h3>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div>
                      <label className="block text-xs font-medium text-gray-700 mb-1">Priority *</label>
                      <select required name="priority" value={formData.customFields.priority} onChange={handleCustomFieldChange} className="w-full px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none">
                        <option value="High">High</option>
                        <option value="Medium">Medium</option>
                        <option value="Low">Low</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-gray-700 mb-1">Est. Hours *</label>
                      <input required type="number" min="0" name="estimatedHours" value={formData.customFields.estimatedHours} onChange={handleCustomFieldChange} className="w-full px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none" placeholder="e.g. 40" />
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-gray-700 mb-1">Client Budget</label>
                      <div className="relative">
                        <span className="absolute left-2.5 top-1.5 text-gray-400 text-sm">$</span>
                        <input type="number" min="0" name="clientBudget" value={formData.customFields.clientBudget} onChange={handleCustomFieldChange} className="w-full pl-6 pr-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none" placeholder="0.00" />
                      </div>
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-gray-700 mb-1">Risk Level</label>
                      <select name="riskLevel" value={formData.customFields.riskLevel} onChange={handleCustomFieldChange} className="w-full px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none">
                        <option value="1">1 - Minimal</option>
                        <option value="2">2 - Low</option>
                        <option value="3">3 - Moderate</option>
                        <option value="4">4 - High</option>
                        <option value="5">5 - Critical</option>
                      </select>
                    </div>
                  </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4 border-t border-gray-100">
                  {/* Subtasks Section */}
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-1.5"><IcoCheckSquare className="w-4 h-4" /> Subtasks</label>
                    <div className="flex gap-2 mb-3">
                      <input type="text" value={newSubtask} onChange={e => setNewSubtask(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter') { e.preventDefault(); handleAddSubtask(); } }} className="flex-1 px-3 py-1.5 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none" placeholder="Add a subtask..." />
                      <button type="button" onClick={handleAddSubtask} className="px-3 py-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition-colors">Add</button>
                    </div>
                    <div className="space-y-2 max-h-32 overflow-y-auto pr-2">
                      {formData.subtasks.map(st => (
                        <div key={st.id} className="flex items-center gap-3 p-2 border border-gray-100 rounded-lg bg-gray-50 group hover:border-gray-200">
                          <input type="checkbox" checked={st.completed} onChange={() => toggleSubtask(st.id)} className="w-4 h-4 text-primary rounded border-gray-300 focus:ring-primary cursor-pointer" />
                          <span className={`flex-1 text-sm ${st.completed ? 'text-gray-400 line-through' : 'text-gray-700'}`}>{st.title}</span>
                          <button type="button" onClick={() => removeSubtask(st.id)} className="opacity-0 group-hover:opacity-100 p-1 text-gray-400 hover:text-red-500 rounded"><IcoTrash2 className="w-3.5 h-3.5" /></button>
                        </div>
                      ))}
                      {formData.subtasks.length === 0 && <p className="text-xs text-gray-400 italic">No subtasks added.</p>}
                    </div>
                  </div>

                  {/* Mentions / Comments */}
                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-2 flex items-center gap-1.5"><IcoMessageSquare className="w-4 h-4" /> Comments & Activity</label>
                    <div className="space-y-3 mb-3 max-h-32 overflow-y-auto pr-2">
                      {formData.comments.map(c => (
                        <div key={c.id} className="bg-primary/5 rounded-lg p-3 text-sm border border-primary/10">
                          <p className="text-text mb-1">{c.text}</p>
                          <span className="text-[10px] text-gray-400">{c.date}</span>

                      ))}
                      {formData.comments.length === 0 && <p className="text-xs text-gray-400 italic">No comments yet. Type @name to mention.</p>}
                    </div>
                    <div className="flex gap-2">
                      <textarea value={newComment} onChange={e => setNewComment(e.target.value)} onKeyDown={(e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleAddComment(); } }} className="flex-1 px-3 py-2 text-sm border border-gray-200 rounded-lg focus:ring-2 focus:ring-primary outline-none resize-none min-h-[100px]" placeholder="Write a comment or type @mention..." />
                      <button type="button" onClick={handleAddComment} className="px-4 py-2 bg-secondary/10 hover:bg-secondary/20 text-secondary text-sm font-medium rounded-lg transition-colors flex-shrink-0 self-end">Post</button>
                    </div>
                  </div>
                </div>
              </form>
            </div>
            
            <div className="flex justify-end gap-3 p-6 border-t border-gray-100 bg-gray-50 flex-shrink-0">
              <button type="button" onClick={onClose} className="px-5 py-2 text-text bg-white border border-gray-200 hover:bg-gray-50 rounded-lg font-medium transition-colors">Cancel</button>
              <button type="submit" form="project-form" className="px-5 py-2 text-white bg-primary hover:bg-primary/90 rounded-lg font-medium shadow-sm transition-all active:scale-95">
                {initialData ? 'Save Changes' : 'Create Project'}
              </button>
            </div>
          </div>
        </div>
      );
    };

    // Subcomponent for Metric Cards
    function MetricCard({ title, value, color, imgSrc }) {
      return (
        <div className={`p-4 rounded-xl border ${color} flex items-center gap-4`}>
          {imgSrc && (
            <div className="w-[50px] h-[50px] flex-shrink-0 rounded-[7px] overflow-hidden bg-bg border border-white/20 shadow-sm">
              <img src={imgSrc} alt={title} className="w-full h-full object-cover" />
            </div>
          )}
          <div>
            <h3 className="text-sm font-medium opacity-80 mb-0.5 leading-tight">{title}</h3>
            <div className="text-3xl font-bold leading-none mt-1">
              <AnimatedCounter value={value} />
            </div>
          </div>
        </div>
      );
    }

    // 5. Main App Component
    function App() {
      // History State Management
      const [past, setPast] = useState([]);
      const [future, setFuture] = useState([]);
      const [projects, setProjects] = useState(initialProjects);
      const [viewMode, setViewMode] = useState('kanban'); // 'kanban', 'list', 'gallery'
      
      const updateProjects = useCallback((newProjectsOrUpdater) => {
         setProjects(current => {
            const nextProjects = typeof newProjectsOrUpdater === 'function' ? newProjectsOrUpdater(current) : newProjectsOrUpdater;
            setPast(p => [...p, current].slice(-50)); // Keep last 50 states
            setFuture([]);
            return nextProjects;
         });
      }, []);

      const handleUndo = useCallback(() => {
         if (past.length === 0) return;
         const previous = past[past.length - 1];
         setPast(past.slice(0, past.length - 1));
         setFuture([projects, ...future]);
         setProjects(previous);
      }, [past, future, projects]);

      const handleRedo = useCallback(() => {
         if (future.length === 0) return;
         const next = future[0];
         setFuture(future.slice(1));
         setPast([...past, projects]);
         setProjects(next);
      }, [past, future, projects]);

      // Search & Selection State
      const [searchQuery, setSearchQuery] = useState('');
      const searchInputRef = useRef(null);
      const [selectedIds, setSelectedIds] = useState(new Set());

      // Global Hotkeys
      useEffect(() => {
        const handleKeyDown = (e) => {
          // Prevent triggering hotkeys if typing in an input
          if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;

          if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            searchInputRef.current?.focus();
          }
          if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
            e.preventDefault();
            handleUndo();
          }
          if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) {
            e.preventDefault();
            handleRedo();
          }

          // Feature: Keyboard Shortcuts
          if (e.key.toLowerCase() === 'n') {
             e.preventDefault();
             openNewProject();
          }
          if (e.key.toLowerCase() === 'e' && selectedIds.size === 1) {
             e.preventDefault();
             const p = projects.find(x => x.id === Array.from(selectedIds)[0]);
             if (p) openEditProject(p);
          }
          if (e.key === 'Delete' || e.key === 'Backspace') {
             if (selectedIds.size > 0) {
               e.preventDefault();
               handleBulkDelete();
             }
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [handleUndo, handleRedo, selectedIds, projects]);

      const [contacts] = useState(initialContacts);
      const [organizations] = useState(initialOrganizations);
      const [quotes] = useState(initialQuotes);
      const [invoices] = useState(initialInvoices);
      const [receipts] = useState(initialReceipts);
      
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [isSettingsOpen, setIsSettingsOpen] = useState(false);
      const [editingProject, setEditingProject] = useState(null);
      const [showConfetti, setShowConfetti] = useState(false);
      const [toasts, setToasts] = useState([]);

      // Toast Logic
      const addToast = useCallback((message, title = 'Notification', type = 'info') => {
        const id = Date.now().toString() + Math.random().toString();
        setToasts(prev => [...prev, { id, title, message, type }]);
        setTimeout(() => removeToast(id), 5000);
      }, []);
      const removeToast = useCallback((id) => {
        setToasts(prev => prev.filter(t => t.id !== id));
      }, []);

      // Startup Notifications Check (Deadlines & Untouched)
      useEffect(() => {
        const now = new Date();
        let delay = 1000; 
        
        projects.forEach(p => {
          if (p.status === 'Completed' || p.status === 'Cancelled') return;

          if (p.updatedAt) {
            const daysUntouched = (now - new Date(p.updatedAt)) / (1000 * 60 * 60 * 24);
            if (daysUntouched >= 7) {
              setTimeout(() => addToast(`${p.name} hasn't been updated in 7 days.`, 'Needs Attention', 'warning'), delay);
              delay += 800;
            }
          }

          if (p.deadline) {
            const daysLeft = (new Date(p.deadline) - now) / (1000 * 60 * 60 * 24);
            if (daysLeft > 0 && daysLeft <= 1) {
               setTimeout(() => addToast(`${p.name} is due within 24 hours!`, 'Urgent Deadline', 'alert'), delay);
               delay += 800;
            } else if (daysLeft > 1 && daysLeft <= 2) {
               setTimeout(() => addToast(`${p.name} is due within 48 hours.`, 'Approaching Deadline', 'warning'), delay);
               delay += 800;
            } else if (daysLeft > 2 && daysLeft <= 7) {
               setTimeout(() => addToast(`${p.name} is due in ${Math.ceil(daysLeft)} days.`, 'Upcoming Deadline', 'info'), delay);
               delay += 800;
            }
          }
        });
      }, []);

      // Drag State Management
      const [dragOverStage, setDragOverStage] = useState(null);
      const scrollContainerRef = useRef(null);
      const [isPanning, setIsPanning] = useState(false);
      const [startX, setStartX] = useState(0);
      const [scrollLeft, setScrollLeft] = useState(0);

      const [visibleLimits, setVisibleLimits] = useState({ 'New Projects': 10, 'In Progress': 10, 'Completed': 10, 'Cancelled': 10 });
      const handleExpand = (stage) => setVisibleLimits(prev => ({ ...prev, [stage]: prev[stage] + 10 }));

      const onPanStart = (e) => {
        if (e.target.closest('[draggable]') || e.target.closest('button')) return;
        setIsPanning(true);
        setStartX(e.pageX - scrollContainerRef.current.offsetLeft);
        setScrollLeft(scrollContainerRef.current.scrollLeft);
      };
      const onPanLeaveOrUp = () => setIsPanning(false);
      const onPanMove = (e) => {
        if (!isPanning) return;
        e.preventDefault();
        const walk = (e.pageX - scrollContainerRef.current.offsetLeft - startX) * 1.5;
        scrollContainerRef.current.scrollLeft = scrollLeft - walk;
      };

      const metrics = useMemo(() => {
        const total = projects.length;
        const inProgress = projects.filter(p => p.status === 'In Progress').length;
        const completed = projects.filter(p => p.status === 'Completed').length;
        const cancelled = projects.filter(p => p.status === 'Cancelled').length;
        return { total, inProgress, completed, cancelled };
      }, [projects]);

      const triggerConfetti = () => {
        setShowConfetti(false);
        setTimeout(() => setShowConfetti(true), 10);
        setTimeout(() => setShowConfetti(false), 3500);
      };

      const handleSaveProject = (projectData) => {
        let finalData = { ...projectData };
        const hasSubtasks = finalData.subtasks && finalData.subtasks.length > 0;
        const allDone = hasSubtasks && finalData.subtasks.every(st => st.completed);
        
        if (allDone && finalData.status !== 'Completed') {
           finalData.status = 'Completed';
           addToast(`All subtasks completed. Moved to Completed!`, 'Auto-Completed', 'success');
        }

        if (finalData.id) {
          const oldProject = projects.find(p => p.id === finalData.id);
          if (oldProject && oldProject.status !== 'Completed' && finalData.status === 'Completed') triggerConfetti();
          updateProjects(prev => prev.map(p => p.id === finalData.id ? finalData : p));
        } else {
          if (finalData.status === 'Completed') triggerConfetti();
          const newProject = { ...finalData, id: `proj-${Date.now()}` };
          updateProjects(prev => [...prev, newProject]);
          addToast(`Project created successfully.`, 'New Project', 'success');
        }
      };

      const handleDeleteProject = (id) => {
        if(confirm('Are you sure you want to delete this project?')) {
          updateProjects(prev => prev.filter(p => p.id !== id));
          addToast('Project has been deleted.', 'Deleted', 'info');
        }
      };

      const handleCloneProject = (project) => {
         const newProject = {
            ...project,
            id: `proj-${Date.now()}`,
            name: `${project.name} (Copy)`,
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
         };
         updateProjects(prev => [...prev, newProject]);
         addToast(`Project cloned successfully.`, 'Cloned', 'success');
      };

      const handleCardClick = (e, id) => {
        if (e.target.closest('button')) return; // Ignore if clicking a button inside the card
        if (e.shiftKey || e.metaKey || e.ctrlKey) {
          const newSet = new Set(selectedIds);
          if (newSet.has(id)) newSet.delete(id); else newSet.add(id);
          setSelectedIds(newSet);
        } else {
          if (selectedIds.has(id) && selectedIds.size === 1) setSelectedIds(new Set());
          else setSelectedIds(new Set([id]));
        }
      };

      const handleBulkStatus = (newStatus) => {
         if (!newStatus) return;
         if (newStatus === 'Completed') triggerConfetti();
         updateProjects(prev => prev.map(p => selectedIds.has(p.id) ? { ...p, status: newStatus, updatedAt: new Date().toISOString() } : p));
         addToast(`${selectedIds.size} projects moved to ${newStatus}.`, 'Bulk Action', 'success');
         setSelectedIds(new Set());
      };

      const handleBulkDelete = () => {
         if(confirm(`Are you sure you want to delete ${selectedIds.size} selected project(s)?`)) {
            updateProjects(prev => prev.filter(p => !selectedIds.has(p.id)));
            addToast(`${selectedIds.size} projects deleted.`, 'Bulk Deletion', 'info');
            setSelectedIds(new Set());
         }
      };

      const handleExportCSV = () => {
         const filtered = projects.filter(p => (p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.tags?.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))));
         const headers = ['ID', 'Name', 'Status', 'Deadline', 'Organization', 'Contact', 'Priority', 'Est. Hours'];
         const rows = filtered.map(p => [
           p.id, `"${p.name}"`, p.status, p.deadline || '', 
           organizations.find(o=>o.id===p.organizationId)?.name || '',
           contacts.find(c=>c.id===p.contactId)?.name || '',
           p.customFields?.priority || '', p.customFields?.estimatedHours || ''
         ]);
         const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows.map(e => e.join(','))].join("\n");
         const encodedUri = encodeURI(csvContent);
         const link = document.createElement("a");
         link.setAttribute("href", encodedUri);
         link.setAttribute("download", "projects_export.csv");
         document.body.appendChild(link);
         link.click();
         document.body.removeChild(link);
         addToast('Projects exported to CSV successfully.', 'Export Complete', 'success');
      };

      const openNewProject = () => { setEditingProject(null); setIsModalOpen(true); };
      const openEditProject = (project) => { setEditingProject(project); setIsModalOpen(true); };

      const handleDragStart = (e, projectId) => {
        let idsToDrag = [projectId];
        if (selectedIds.has(projectId)) idsToDrag = Array.from(selectedIds);
        e.dataTransfer.setData('projectIds', JSON.stringify(idsToDrag));
        e.target.style.opacity = '0.5';
      };
      const handleDragEnd = (e) => { e.target.style.opacity = '1'; };

      const handleDrop = (e, newStatus) => {
        e.preventDefault();
        setDragOverStage(null); 
        const draggedIds = JSON.parse(e.dataTransfer.getData('projectIds') || '[]');
        
        if (draggedIds.length > 0) {
          if (newStatus === 'Completed') triggerConfetti();
          updateProjects(prev => prev.map(p => draggedIds.includes(p.id) ? { ...p, status: newStatus, updatedAt: new Date().toISOString() } : p));
          addToast(`Moved ${draggedIds.length} item(s) to ${newStatus}`, `Bulk Move`, 'info');
          setSelectedIds(new Set()); // Clear selection after drag
        }
      };

      const getContactName = (id) => contacts.find(c => c.id === id)?.name || 'No Contact';
      const getOrg = (id) => organizations.find(o => o.id === id);

      return (
        <div className="min-h-screen flex flex-col">
          {showConfetti && <Confetti />}
          <ToastContainer toasts={toasts} removeToast={removeToast} />

          {/* Bulk Actions Bar */}
          {selectedIds.size > 0 && (
             <div className="bulk-bar-enter fixed bottom-8 left-1/2 transform -translate-x-1/2 bg-primary text-white px-5 py-3 rounded-2xl shadow-2xl z-50 flex items-center gap-4 border border-white/10">
                <span className="font-semibold whitespace-nowrap text-sm">{selectedIds.size} selected</span>
                <div className="w-px h-5 bg-white/20"></div>
                <select onChange={(e) => handleBulkStatus(e.target.value)} value="" className="bg-white/10 border border-white/20 rounded-lg px-2 py-1 text-sm outline-none cursor-pointer focus:ring-2 focus:ring-white/40 appearance-none">
                   <option value="" disabled className="text-gray-800">Change Status...</option>
                   {STAGES.map(s => <option key={s} value={s} className="text-gray-800">{s}</option>)}
                </select>
                <div className="w-px h-5 bg-white/20"></div>
                <button onClick={handleBulkDelete} className="hover:text-rose-300 transition-colors p-1" title="Delete Selected (Del)"><IcoTrash2 className="w-4 h-4" /></button>
                <button onClick={() => setSelectedIds(new Set())} className="hover:text-gray-300 transition-colors p-1" title="Clear Selection"><IcoX className="w-4 h-4" /></button>
             </div>
          )}
          
          <header className="bg-primary border-b border-primary/80 sticky top-0 z-30 shadow-md">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
              <div className="flex flex-col md:flex-row justify-between items-center gap-4">
                <div className="flex justify-center items-center gap-3 w-full md:w-auto">
                  <img src="https://bucket.mlcdn.com/a/3336/3336910/images/7cd0db4536b375626cd92515088b19eececccc8b.png" alt="Logo" className="w-10 h-10 object-contain" />
                  <h1 className="text-2xl font-bold text-white tracking-tight hidden lg:block">Project Manager</h1>
                </div>
                
                <div className="flex justify-center items-center gap-2 w-full md:w-auto flex-wrap">
                  
                  <div className="relative group mr-1 md:mr-2 w-full sm:w-auto mb-2 sm:mb-0">
                    <IcoSearch className="w-4 h-4 text-white/60 absolute left-3 top-1/2 transform -translate-y-1/2" />
                    <input 
                      ref={searchInputRef}
                      type="text" 
                      placeholder="Search (Cmd+K)" 
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                      className="bg-white/10 border border-white/20 text-white placeholder-white/50 pl-9 pr-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-white/40 focus:bg-white/20 w-full sm:w-48 sm:focus:w-64 transition-all"
                    />
                  </div>

                  <div className="flex items-center bg-white/10 border border-white/20 rounded-lg p-0.5 mr-1 md:mr-2">
                    <button onClick={handleExportCSV} className="p-2.5 rounded-md transition-colors text-white hover:bg-white/20" title="Export to CSV">
                      <IcoDownload className="w-4 h-4" />
                    </button>
                    <button onClick={handleUndo} disabled={past.length === 0} className={`p-2.5 rounded-md transition-colors ${past.length > 0 ? 'text-white hover:bg-white/20' : 'text-white/30 cursor-not-allowed'}`} title="Undo (Cmd+Z)">
                      <IcoUndo className="w-4 h-4" />
                    </button>
                    <button onClick={handleRedo} disabled={future.length === 0} className={`p-2.5 rounded-md transition-colors ${future.length > 0 ? 'text-white hover:bg-white/20' : 'text-white/30 cursor-not-allowed'}`} title="Redo (Cmd+Y)">
                      <IcoRedo className="w-4 h-4" />
                    </button>
                  </div>

                  <div className="flex items-center bg-white/10 border border-white/20 rounded-lg p-0.5 mr-1 md:mr-2">
                    <button onClick={() => setViewMode('kanban')} className={`p-2.5 rounded-md transition-colors ${viewMode === 'kanban' ? 'bg-white/20 text-white shadow-sm' : 'text-white/60 hover:text-white'}`} title="Kanban View">
                      <IcoLayoutDashboard className="w-4 h-4" />
                    </button>
                    <button onClick={() => setViewMode('list')} className={`p-2.5 rounded-md transition-colors ${viewMode === 'list' ? 'bg-white/20 text-white shadow-sm' : 'text-white/60 hover:text-white'}`} title="List View">
                      <IcoList className="w-4 h-4" />
                    </button>
                    <button onClick={() => setViewMode('gallery')} className={`p-2.5 rounded-md transition-colors ${viewMode === 'gallery' ? 'bg-white/20 text-white shadow-sm' : 'text-white/60 hover:text-white'}`} title="Gallery View">
                      <IcoGrid className="w-4 h-4" />
                    </button>
                  </div>

                  <button onClick={() => setIsSettingsOpen(true)} className="flex items-center justify-center p-2.5 text-white bg-white/10 border border-white/20 hover:bg-white/20 rounded-lg shadow-sm transition-colors" title="Settings">
                    <IcoSettings className="w-5 h-5" />
                  </button>
                  <button onClick={openNewProject} className="flex items-center gap-2 bg-white hover:bg-gray-50 text-primary px-4 sm:px-5 py-2.5 rounded-lg font-medium shadow-sm transition-all active:scale-95">
                    <IcoPlus className="w-5 h-5" />
                    <span className="hidden sm:inline">New Project</span>
                  </button>
                </div>
              </div>

              <div className="mt-8 text-center md:text-left">
                <p className="text-white/80 mb-4 text-sm font-medium">Manage projects, track stages, and monitor relationships.</p>
                <div className="grid grid-cols-2 md:grid-cols-4 gap-4 text-left">
                  <MetricCard title="Total Projects" value={metrics.total} color="bg-white text-primary border-white/20 shadow-sm" imgSrc="https://bucket.mlcdn.com/a/3336/3336910/images/6592fc56ea80d7990cd945a7f819502463ad17b7.png" />
                  <MetricCard title="In Progress" value={metrics.inProgress} color="bg-white text-amber-600 border-white/20 shadow-sm" imgSrc="https://bucket.mlcdn.com/a/3336/3336910/images/d071ffb3dcadee85bced8666c2d4f60b92e6b461.png" />
                  <MetricCard title="Completed" value={metrics.completed} color="bg-white text-emerald-600 border-white/20 shadow-sm" imgSrc="https://bucket.mlcdn.com/a/3336/3336910/images/56e26a9e01708e9576292767a33cb701d19ab1df.png" />
                  <MetricCard title="Cancelled" value={metrics.cancelled} color="bg-white text-rose-600 border-white/20 shadow-sm" imgSrc="https://bucket.mlcdn.com/a/3336/3336910/images/df7822acfb542d1b496ceab4f5c0566c8b37fe48.png" />
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex-1 w-full flex flex-col">
            
            {viewMode === 'kanban' && (
              <div 
                ref={scrollContainerRef}
                onMouseDown={onPanStart}
                onMouseLeave={onPanLeaveOrUp}
                onMouseUp={onPanLeaveOrUp}
                onMouseMove={onPanMove}
                className={`flex-1 flex items-stretch gap-6 overflow-x-auto pb-8 min-h-[calc(100vh-300px)] snap-x snap-mandatory scroll-smooth ${isPanning ? 'cursor-grabbing select-none' : 'cursor-grab'}`}
              >
                {STAGES.map(stage => {
                  const stageProjects = projects.filter(p => p.status === stage && (p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.tags?.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))));
                  const visibleProjects = stageProjects.slice(0, visibleLimits[stage]);
                  const hasMore = stageProjects.length > visibleLimits[stage];
                  const isDragOver = dragOverStage === stage;

                  return (
                  <div 
                    key={stage}
                    className={`flex-shrink-0 w-80 rounded-xl border border-slate-200 flex flex-col transition-colors duration-200 snap-center ${isDragOver ? 'bg-gray-200' : 'bg-slate-100/80'}`}
                    onDragOver={(e) => { e.preventDefault(); setDragOverStage(stage); }}
                    onDragLeave={() => setDragOverStage(null)}
                    onDrop={(e) => handleDrop(e, stage)}
                  >
                    <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-100/50 rounded-t-xl shrink-0 pointer-events-none sticky top-0 z-10 backdrop-blur-sm">
                      <h3 className="font-semibold text-title flex items-center gap-2">
                        {stage}
                        <span className="bg-card border border-slate-200 text-xs py-0.5 px-2 rounded-full text-text font-medium shadow-sm">
                          {stageProjects.length}
                        </span>
                      </h3>
                    </div>
                    
                    <div className="p-3 flex-1 space-y-3">
                      {visibleProjects.map(project => {
                        const org = getOrg(project.organizationId);
                        const subtaskTotal = project.subtasks?.length || 0;
                        const subtasksDone = project.subtasks?.filter(st => st.completed).length || 0;
                        
                        // Card Aging Logic
                        const daysUntouched = project.updatedAt ? Math.floor((new Date() - new Date(project.updatedAt)) / (1000 * 60 * 60 * 24)) : 0;
                        const isAgingWarning = project.status !== 'Completed' && project.status !== 'Cancelled' && daysUntouched >= 4 && daysUntouched < 7;
                        const isAgingCritical = project.status !== 'Completed' && project.status !== 'Cancelled' && daysUntouched >= 7;
                        
                        const isSelected = selectedIds.has(project.id);
                        const borderClass = isSelected 
                          ? 'border-primary ring-2 ring-primary ring-offset-2' 
                          : isAgingCritical 
                          ? 'border-rose-400 ring-2 ring-rose-400/50 shadow-rose-100' 
                          : isAgingWarning 
                          ? 'border-amber-400 ring-2 ring-amber-400/50 shadow-amber-100' 
                          : 'border-slate-200';

                        // Deadline Colors
                        let deadlineColorClass = 'text-gray-600 bg-gray-50 border-gray-100';
                        if (project.deadline && project.status !== 'Completed') {
                          const daysLeft = (new Date(project.deadline) - new Date()) / (1000 * 60 * 60 * 24);
                          if (daysLeft < 0) deadlineColorClass = 'text-rose-700 bg-rose-50 border-rose-200';
                          else if (daysLeft <= 3) deadlineColorClass = 'text-amber-700 bg-amber-50 border-amber-200';
                          else deadlineColorClass = 'text-emerald-700 bg-emerald-50 border-emerald-200';
                        }

                        return (
                          <div
                            key={project.id}
                            draggable
                            onDragStart={(e) => handleDragStart(e, project.id)}
                            onDragEnd={handleDragEnd}
                            onClick={(e) => handleCardClick(e, project.id)}
                            className={`bg-card rounded-lg shadow-sm hover:shadow-md border ${borderClass} overflow-hidden cursor-pointer transition-all group relative shrink-0`}
                          >
                            {(isAgingWarning || isAgingCritical) && (
                              <div className={`absolute top-2 right-2 px-2 py-0.5 rounded-md text-[10px] font-bold shadow-sm flex items-center gap-1 z-30 ${isAgingCritical ? 'bg-rose-100 text-rose-700 border-rose-200' : 'bg-amber-100 text-amber-700 border-amber-200'} border`}>
                                <IcoAlertTriangle className="w-3 h-3" />
                                {daysUntouched}d in stage
                              </div>
                            )}

                            <div className="absolute left-0 top-0 bottom-0 w-1.5 z-20" style={{ backgroundColor: project.color }}></div>
                            
                            <div className="h-24 w-full bg-gray-100 overflow-hidden relative">
                              <img 
                                src={project.bannerUrl || getDefaultBanner(project.id)} 
                                alt="Project Banner" 
                                className="w-full h-full object-cover object-center pointer-events-none"
                                onError={(e) => e.target.style.display = 'none'}
                              />
                            </div>
                            
                            <div className="p-4 pl-5 relative">
                              {org?.logo && (
                                <div className="absolute -top-7 left-5 w-12 h-12 rounded-full border-[3px] border-card shadow-sm overflow-hidden bg-card z-10 flex items-center justify-center">
                                   <img src={org.logo} alt={org.name} className="w-full h-full object-cover" />
                                </div>
                              )}

                              <div className="flex justify-between items-start gap-2">
                                <h4 className={`font-semibold text-title leading-tight mb-2 group-hover:text-primary transition-colors ${org?.logo ? 'pt-5' : ''}`}>
                                  {project.name}
                                </h4>
                                <div className={`flex opacity-0 group-hover:opacity-100 transition-opacity ${org?.logo ? 'pt-5' : ''}`}>
                                  <button onClick={(e) => { e.stopPropagation(); handleCloneProject(project); }} className="p-1 text-gray-400 hover:text-primary rounded" title="Clone Project"><IcoCopy className="w-4 h-4" /></button>
                                  <button onClick={(e) => { e.stopPropagation(); openEditProject(project); }} className="p-1 text-gray-400 hover:text-primary rounded" title="Edit"><IcoEdit3 className="w-4 h-4" /></button>
                                  <button onClick={(e) => { e.stopPropagation(); handleDeleteProject(project.id); }} className="p-1 text-gray-400 hover:text-red-600 rounded" title="Delete"><IcoTrash2 className="w-4 h-4" /></button>
                                </div>
                              </div>

                              {org && (
                                <div className="flex items-center gap-1.5 text-xs text-text mb-1 truncate">
                                  <IcoBuilding2 className="w-3.5 h-3.5 flex-shrink-0" />
                                  <span className="truncate">{org.name}</span>
                                </div>
                              )}
                              
                              {project.contactId && (
                                <div className="flex items-center gap-1.5 text-xs text-text mb-3 truncate">
                                  <IcoUserCircle className="w-3.5 h-3.5 flex-shrink-0" />
                                  <span className="truncate">{getContactName(project.contactId)}</span>
                                </div>
                              )}

                              {project.customFields && (
                                <div className="grid grid-cols-2 gap-2 mb-3 pt-2 border-t border-gray-100">
                                  <div className="flex items-center gap-1.5 text-[10px] text-gray-500">
                                    <IcoZap className={`w-3 h-3 flex-shrink-0 ${project.customFields.priority === 'High' ? 'text-rose-500' : project.customFields.priority === 'Medium' ? 'text-amber-500' : 'text-emerald-500'}`} />
                                    <span className="truncate font-medium text-gray-700">{project.customFields.priority} Priority</span>
                                  </div>
                                  {project.customFields.estimatedHours && (
                                    <div className="flex items-center gap-1.5 text-[10px] text-gray-500">
                                      <IcoClock className="w-3 h-3 flex-shrink-0 text-primary" />
                                      <span className="truncate font-medium text-gray-700">{project.customFields.estimatedHours}h Est.</span>
                                    </div>
                                  )}
                                </div>
                              )}

                              {subtaskTotal > 0 && (
                                <div className="mb-3">
                                  <div className="flex items-center justify-between text-[10px] text-gray-500 mb-1 font-medium">
                                    <span>Subtasks</span>
                                    <span>{subtasksDone}/{subtaskTotal}</span>
                                  </div>
                                  <div className="w-full bg-gray-100 rounded-full h-1.5">
                                    <div className="bg-primary h-1.5 rounded-full transition-all" style={{ width: `${(subtasksDone/subtaskTotal)*100}%` }}></div>
                                  </div>
                                </div>
                              )}

                              {(project.quoteId || project.invoiceId || project.receiptId || project.comments?.length > 0) && (
                                <div className="flex flex-wrap gap-2 mb-3">
                                  {project.quoteId && (
                                    <span title="Quote Attached" className="flex items-center gap-1 text-[10px] bg-primary/10 text-primary px-2 py-0.5 rounded border border-primary/20 font-medium shadow-sm"><IcoFileText className="w-3 h-3" /> Quote</span>
                                  )}
                                  {project.invoiceId && (
                                    <span title="Invoice Attached" className="flex items-center gap-1 text-[10px] bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded border border-emerald-200 font-medium shadow-sm"><IcoReceipt className="w-3 h-3" /> Invoice</span>
                                  )}
                                  {project.receiptId && (
                                    <span title="Receipt Attached" className="flex items-center gap-1 text-[10px] bg-purple-50 text-purple-700 px-2 py-0.5 rounded border border-purple-200 font-medium shadow-sm"><IcoFileArchive className="w-3 h-3" /> Receipt</span>
                                  )}
                                  {project.comments?.length > 0 && (
                                    <span title="Comments" className="flex items-center gap-1 text-[10px] bg-secondary/10 text-secondary px-2 py-0.5 rounded border border-secondary/20 font-medium shadow-sm"><IcoMessageSquare className="w-3 h-3" /> {project.comments.length}</span>
                                  )}
                                </div>
                              )}

                              {project.deadline && (
                                <div className={`flex items-center gap-1.5 text-xs font-medium inline-flex px-2 py-1 rounded-md mb-3 border ${deadlineColorClass}`}>
                                  <IcoCalendar className="w-3.5 h-3.5" />
                                  {new Date(project.deadline).toLocaleDateString()}
                                </div>
                              )}

                              {project.tags && project.tags.length > 0 && (
                                <div className="flex flex-wrap gap-1 mt-1">
                                  {project.tags.map((tag, i) => (
                                    <span key={i} className="flex items-center gap-1 text-[10px] font-medium px-1.5 py-0.5 rounded border" style={{ backgroundColor: `${project.color}20`, color: project.color, borderColor: `${project.color}40` }}>
                                      <IcoTag className="w-2.5 h-2.5" />
                                      {tag}
                                    </span>
                                  ))}
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                      
                      {stageProjects.length === 0 && (
                        <div className="h-full flex items-center justify-center border-2 border-dashed border-gray-200 rounded-lg p-6 pointer-events-none">
                          <p className="text-sm text-gray-400 font-medium text-center">Drag projects here</p>
                        </div>
                      )}

                      {hasMore && (
                        <button onClick={() => handleExpand(stage)} className="w-full py-2 mt-2 text-sm font-medium text-primary hover:text-primary/80 hover:bg-primary/10 rounded-lg transition-colors border border-transparent hover:border-primary/20">
                          Expand ({stageProjects.length - visibleLimits[stage]} more)
                        </button>
                      )}
                    </div>
                  </div>
                  );
                })}
              </div>
            )}

            {viewMode === 'list' && (() => {
               const filteredProjects = projects.filter(p => (p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.tags?.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))));
               
               return (
                 <div className="bg-card rounded-xl shadow-sm border border-slate-200 overflow-hidden w-full">
                    <div className="overflow-x-auto">
                       <table className="w-full text-left border-collapse whitespace-nowrap min-w-[800px]">
                         <thead>
                            <tr className="bg-slate-50 border-b border-slate-200 text-xs font-semibold text-gray-500 uppercase tracking-wider">
                               <th className="p-4 w-12 text-center">
                                  <input type="checkbox" className="rounded border-gray-300 text-primary focus:ring-primary cursor-pointer" onChange={(e) => {
                                     if (e.target.checked) setSelectedIds(new Set(filteredProjects.map(p => p.id)));
                                     else setSelectedIds(new Set());
                                  }} checked={filteredProjects.length > 0 && selectedIds.size === filteredProjects.length} />
                               </th>
                               <th className="p-4">Project Name</th>
                               <th className="p-4">Status</th>
                               <th className="p-4">Deadline</th>
                               <th className="p-4">Priority</th>
                               <th className="p-4">Client/Org</th>
                            </tr>
                         </thead>
                         <tbody className="divide-y divide-slate-100">
                            {filteredProjects.map(project => (
                               <tr key={project.id} onClick={(e) => handleCardClick(e, project.id)} className={`hover:bg-slate-50 cursor-pointer transition-colors group ${selectedIds.has(project.id) ? 'bg-primary/5' : ''}`}>
                                  <td className="p-4 text-center">
                                     <input type="checkbox" checked={selectedIds.has(project.id)} readOnly className="rounded border-gray-300 text-primary focus:ring-primary cursor-pointer pointer-events-none" />
                                  </td>
                                  <td className="p-4">
                                     <div className="flex items-center gap-3">
                                        <div className="w-8 h-8 rounded bg-gray-100 overflow-hidden flex-shrink-0">
                                           <img src={project.bannerUrl || getDefaultBanner(project.id)} className="w-full h-full object-cover" onError={(e) => e.target.style.display='none'} />
                                        </div>
                                        <span className="font-medium text-title">{project.name}</span>
                                     </div>
                                  </td>
                                  <td className="p-4">
                                     <span className="bg-gray-100 px-2 py-1 rounded text-xs text-gray-600 font-medium">{project.status}</span>
                                  </td>
                                  <td className="p-4 text-sm text-gray-500">
                                     {project.deadline ? new Date(project.deadline).toLocaleDateString() : '-'}
                                  </td>
                                  <td className="p-4">
                                     <span className={`text-xs font-medium px-2 py-1 rounded-full ${project.customFields?.priority === 'High' ? 'bg-rose-100 text-rose-700' : project.customFields?.priority === 'Medium' ? 'bg-amber-100 text-amber-700' : 'bg-emerald-100 text-emerald-700'}`}>
                                        {project.customFields?.priority || 'Normal'}
                                     </span>
                                  </td>
                                  <td className="p-4 text-sm text-gray-500">
                                     {getOrg(project.organizationId)?.name || '-'}
                                  </td>
                               </tr>
                            ))}
                            {filteredProjects.length === 0 && (
                               <tr>
                                  <td colSpan="6" className="p-8 text-center text-gray-500">No projects found.</td>
                               </tr>
                            )}
                         </tbody>
                       </table>
                    </div>
                 </div>
               );
            })()}

            {viewMode === 'gallery' && (() => {
               const filteredProjects = projects.filter(p => (p.name.toLowerCase().includes(searchQuery.toLowerCase()) || p.tags?.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()))));
               
               return (
                 <div className="flex flex-col gap-8 w-full">
                   {STAGES.map(stage => {
                      const stageProjects = filteredProjects.filter(p => p.status === stage);
                      if (stageProjects.length === 0) return null;
                      
                      return (
                        <div key={stage}>
                           <h3 className="text-lg font-bold text-title mb-4 border-b border-gray-200 pb-2">{stage} <span className="text-sm font-normal text-text ml-2">({stageProjects.length})</span></h3>
                           <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4">
                              {stageProjects.map(project => (
                                 <div 
                                    key={project.id} 
                                    onClick={(e) => handleCardClick(e, project.id)} 
                                    className={`relative aspect-[4/3] rounded-xl overflow-hidden cursor-pointer group transition-all bg-gray-100 ${selectedIds.has(project.id) ? 'ring-4 ring-primary ring-offset-2' : 'hover:shadow-lg'}`}
                                 >
                                    <img src={project.bannerUrl || getDefaultBanner(project.id)} alt={project.name} className="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onError={(e) => e.target.style.display='none'} />
                                    <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent opacity-80 group-hover:opacity-100 transition-opacity"></div>
                                    
                                    {/* Quick Actions (visible on hover) */}
                                    <div className="absolute top-2 right-2 flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity z-10">
                                       <button onClick={(e) => { e.stopPropagation(); openEditProject(project); }} className="p-1.5 bg-white/20 hover:bg-white/40 backdrop-blur-md rounded text-white" title="Edit"><IcoEdit3 className="w-3.5 h-3.5" /></button>
                                    </div>

                                    {/* Bottom Left Aligned Name */}
                                    <div className="absolute bottom-3 left-3 right-3 z-10 flex flex-col">
                                       <span className="text-white font-semibold text-sm truncate drop-shadow-md">{project.name}</span>
                                    </div>

                                    {/* Selection Checkmark */}
                                    {selectedIds.has(project.id) && (
                                       <div className="absolute top-2 left-2 bg-primary text-white rounded-full p-0.5 shadow-md z-10">
                                          <IcoCheck className="w-3.5 h-3.5" />
                                       </div>
                                    )}
                                 </div>
                              ))}
                           </div>
                        </div>
                      )
                   })}
                   {filteredProjects.length === 0 && (
                      <div className="text-center text-gray-500 py-12">No projects found.</div>
                   )}
                 </div>
               );
            })()}

          </main>

          <footer className="w-full py-6 text-center text-sm text-text border-t border-gray-200 bg-card">
            Desarrollado con 💖 <a href="https://bebelldigitalsolutions.com" target="_blank" rel="noopener noreferrer" className="text-primary hover:text-primary/80 font-medium hover:underline transition-colors">Bebell</a> Digital Solutions
          </footer>

          <ProjectModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} onSave={handleSaveProject} initialData={editingProject} contacts={contacts} organizations={organizations} quotes={quotes} invoices={invoices} receipts={receipts} addToast={addToast} />
          <SettingsModal isOpen={isSettingsOpen} onClose={() => setIsSettingsOpen(false)} addToast={addToast} />
        </div>
      );
    }

    // Mount the Application
    const rootElement = document.getElementById('root');
    const root = ReactDOM.createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
