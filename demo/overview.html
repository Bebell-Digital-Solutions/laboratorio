    <style>
        body { font-family: 'Inter', sans-serif; }
        
        /* Map container setup */
        #map { z-index: 10; border-radius: 0.75rem; }
        
        /* GitHub-style Heatmap CSS */
        .heatmap-grid {
            display: grid;
            grid-template-rows: repeat(7, 1fr);
            grid-auto-flow: column;
            gap: 4px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        .heatmap-cell {
            width: 14px;
            height: 14px;
            border-radius: 3px;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .heatmap-cell:hover {
            transform: scale(1.2);
            box-shadow: 0 0 5px rgba(0,0,0,0.2);
        }
        .level-0 { background-color: #e5e7eb; }
        .level-1 { background-color: #d1cff8; }
        .level-2 { background-color: #8b84f4; }
        .level-3 { background-color: #e07cd0; }
        .level-4 { background-color: #29225b; }
        
        /* Scrollbar styling */
        .custom-scrollbar::-webkit-scrollbar { height: 8px; width: 8px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f0fb; border-radius: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #8b84f4; border-radius: 4px; transition: background 0.2s; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #7169df; cursor: grab; }
        .custom-scrollbar::-webkit-scrollbar-thumb:active { background: #5c53c4; cursor: grabbing; }
        .custom-scrollbar { scrollbar-color: #8b84f4 #f1f0fb; scrollbar-width: thin; }

        /* LED Banner */
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
            display: flex;
            align-items: center;
        }
        .marquee-content {
            display: inline-block;
            animation: marquee 18s linear infinite;
            text-shadow: 0 0 4px rgba(255, 255, 255, 0.8), 0 0 10px rgba(255, 255, 255, 0.4);
            will-change: transform;
        }
        @keyframes marquee {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
    </style>

    <script>
        // Use Locale based on user lang for number formatting
        const localeString = userLang === 'es' ? 'es-ES' : 'en-US';

        // Initialize Lucide Icons
        lucide.createIcons();

        // --- 1. Animated Counters ---
        const animateCounters = () => {
            const counters = document.querySelectorAll('.counter');
            const speed = 200; 

            counters.forEach(counter => {
                const updateCount = () => {
                    const target = +counter.getAttribute('data-target');
                    const count = +(counter.innerText.replace(/\D/g, '')) || 0; // Robust parse
                    const inc = target / speed;

                    if (count < target) {
                        counter.innerText = Math.ceil(count + inc).toLocaleString(localeString);
                        setTimeout(updateCount, 15);
                    } else {
                        counter.innerText = target.toLocaleString(localeString);
                    }
                };
                updateCount();
            });
        };
        
        // --- 2. Chart.js Setup ---
        const initCharts = () => {
            const colors = { primary: '#8b84f4', highlight: '#e07cd0', sidebar: '#29225b', light: '#d1cff8', gray: '#e5e7eb' };

            const ctxDonut = document.getElementById('donutChart').getContext('2d');
            new Chart(ctxDonut, {
                type: 'doughnut',
                data: {
                    labels: [t('chart_tech'), t('chart_health'), t('chart_fin'), t('chart_ret'), t('chart_oth')],
                    datasets: [{
                        data: [35, 25, 20, 10, 10],
                        backgroundColor: [colors.primary, colors.highlight, colors.sidebar, colors.light, colors.gray],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } } },
                    cutout: '70%'
                }
            });

            const ctxLine = document.getElementById('lineChart').getContext('2d');
            new Chart(ctxLine, {
                type: 'line',
                data: {
                    labels: ['Ene', 'Feb', 'Mar', 'Abr', 'May', 'Jun', 'Jul', 'Ago', 'Sep', 'Oct'], // Can be kept static or localized later
                    datasets: [
                        {
                            label: t('chart_growth'),
                            data: [120, 190, 250, 320, 450, 500, 610, 750, 890, 1050],
                            borderColor: colors.primary,
                            backgroundColor: colors.primary + '33',
                            borderWidth: 3, tension: 0.4, fill: true,
                            pointBackgroundColor: '#ffffff', pointBorderColor: colors.primary, pointBorderWidth: 2, pointRadius: 4
                        },
                        {
                            label: t('chart_deals'),
                            data: [50, 80, 110, 140, 160, 210, 240, 290, 310, 380],
                            borderColor: colors.highlight,
                            borderWidth: 3, tension: 0.4, borderDash: [5, 5],
                            pointBackgroundColor: '#ffffff', pointBorderColor: colors.highlight, pointBorderWidth: 2, pointRadius: 4
                        }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', align: 'end', labels: { usePointStyle: true } } },
                    scales: { y: { beginAtZero: true, grid: { borderDash: [4, 4], color: '#f3f4f6' } }, x: { grid: { display: false } } },
                    interaction: { mode: 'index', intersect: false }
                }
            });
        };

        // --- 3. Leaflet Map Setup ---
        const initMap = () => {
            const map = L.map('map').setView([18.4861, -69.9312], 10);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO', subdomains: 'abcd', maxZoom: 19
            }).addTo(map);

            const customIcon = L.divIcon({ className: 'custom-pin', html: `<div style="background-color: #8b84f4; width: 16px; height: 16px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.3);"></div>`, iconSize: [16, 16], iconAnchor: [8, 8] });
            const highlightIcon = L.divIcon({ className: 'custom-pin-highlight', html: `<div style="background-color: #e07cd0; width: 20px; height: 20px; border-radius: 50%; border: 3px solid white; box-shadow: 0 0 5px rgba(0,0,0,0.5);"></div>`, iconSize: [20, 20], iconAnchor: [10, 10] });

            const locations = [
                { coords: [18.4861, -69.9312], title: t("loc_hq"), type: 'highlight' },
                { coords: [18.4716, -69.8923], title: t("loc_col"), type: 'normal' },
                { coords: [18.4950, -69.9700], title: t("loc_her"), type: 'normal' },
                { coords: [18.5200, -69.8800], title: t("loc_sde"), type: 'normal' },
                { coords: [18.4200, -70.0300], title: t("loc_sc"), type: 'normal' }
            ];

            locations.forEach(loc => {
                const icon = loc.type === 'highlight' ? highlightIcon : customIcon;
                L.marker(loc.coords, { icon: icon }).addTo(map).bindPopup(`<b>${loc.title}</b><br/>${t('map_popup')}`);
            });
        };

        // --- 4. Heatmap Generator ---
        const generateHeatmap = () => {
            const scrollContainer = document.getElementById('heatmap-scroll-container');
            const grid = document.getElementById('heatmap');
            grid.innerHTML = '';
            for (let w = 0; w < 260; w++) { // 5 Years
                for (let d = 0; d < 7; d++) {
                    const cell = document.createElement('div');
                    cell.classList.add('heatmap-cell');
                    const random = Math.random();
                    let level = 0;
                    if (random > 0.4) level = 1; if (random > 0.7) level = 2; if (random > 0.85) level = 3; if (random > 0.95) level = 4;
                    cell.classList.add(`level-${level}`);
                    grid.appendChild(cell);
                }
            }
            setTimeout(() => { scrollContainer.scrollLeft = scrollContainer.scrollWidth; }, 100);
        };

        // --- 5. Quick Checklist Logic ---
        let tasks = [];

        const renderTasks = () => {
            const list = document.getElementById('taskList');
            list.innerHTML = '';
            tasks.forEach(task => {
                const li = document.createElement('li');
                li.className = `flex items-center justify-between p-3 rounded-lg border transition-colors ${task.completed ? 'bg-gray-50 border-gray-100' : 'bg-white border-gray-200'}`;
                li.innerHTML = `
                    <div class="flex items-center gap-3 overflow-hidden flex-1">
                        <input type="checkbox" ${task.completed ? 'checked' : ''} onchange="toggleTask(${task.id})" class="flex-shrink-0 w-4 h-4 text-brand-primary rounded border-gray-300 focus:ring-brand-primary accent-brand-primary cursor-pointer">
                        <div class="flex flex-col flex-1 min-w-0">
                            ${task.isEditing ? 
                                `<input type="text" id="edit-input-${task.id}" value="${task.text}" class="text-sm font-medium border border-brand-primary rounded px-2 py-1 w-full focus:outline-none focus:ring-1 focus:ring-brand-primary bg-white" onkeydown="if(event.key==='Enter') saveEdit(${task.id})" onblur="saveEdit(${task.id})">` 
                                : 
                                `<span class="text-sm font-medium truncate w-full ${task.completed ? 'text-gray-400 line-through' : 'text-gray-700'}">${task.text}</span>`
                            }
                            <span class="text-xs mt-0.5 ${task.completed ? 'text-gray-400' : 'text-brand-highlight'} flex items-center gap-1">
                                <i data-lucide="calendar" class="w-3 h-3"></i> ${task.date}
                            </span>
                        </div>
                    </div>
                    <div class="flex items-center gap-1 ml-2 flex-shrink-0">
                        ${task.isEditing ?
                            `<button onmousedown="saveEdit(${task.id})" class="text-brand-primary hover:text-brand-sidebar transition-colors cursor-pointer p-1"><i data-lucide="check" class="w-4 h-4"></i></button>`
                            :
                            `<button onclick="toggleEdit(${task.id})" class="text-gray-400 hover:text-brand-primary transition-colors cursor-pointer p-1" ${task.completed ? 'disabled opacity-50' : ''}><i data-lucide="edit-2" class="w-4 h-4"></i></button>`
                        }
                        <button onclick="deleteTask(${task.id})" class="text-gray-400 hover:text-red-500 transition-colors cursor-pointer p-1"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                `;
                list.appendChild(li);
            });
            lucide.createIcons();
        };

        window.toggleEdit = (id) => {
            const task = tasks.find(t => t.id === id);
            if (task && !task.completed) {
                task.isEditing = true; renderTasks();
                setTimeout(() => { const input = document.getElementById(`edit-input-${id}`); if(input) { input.focus(); input.selectionStart = input.selectionEnd = input.value.length; }}, 0);
            }
        };

        window.saveEdit = (id) => {
            const task = tasks.find(t => t.id === id);
            if (task && task.isEditing) {
                const input = document.getElementById(`edit-input-${id}`);
                if (input && input.value.trim() !== '') task.text = input.value.trim();
                task.isEditing = false; renderTasks();
            }
        };

        window.toggleTask = (id) => { const task = tasks.find(t => t.id === id); if (task) { task.completed = !task.completed; renderTasks(); } };
        window.deleteTask = (id) => { tasks = tasks.filter(t => t.id !== id); renderTasks(); };

        document.getElementById('taskForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const textInput = document.getElementById('taskInput');
            const dateInput = document.getElementById('taskDate');
            if (textInput.value && dateInput.value) {
                tasks.unshift({ id: Date.now(), text: textInput.value, date: dateInput.value, completed: false });
                textInput.value = ''; dateInput.value = ''; renderTasks();
            }
        });

        // --- 6. Goals Logic ---
        let goals = [
            { id: 1, type: "contacts", target: 15000, date: "2026-12-31", progress: 14582 },
            { id: 2, type: "messages", target: 100000, date: "2026-06-30", progress: 89345 }
        ];

        const getGoalIcon = (type) => {
            const icons = { 'contacts': 'users', 'organizations': 'building-2', 'messages': 'send', 'tasks': 'check-circle', 'productivity': 'bar-chart-2' };
            return icons[type] || 'target';
        };

        const renderGoals = () => {
            const list = document.getElementById('goalsList');
            list.innerHTML = '';
            
            if (goals.length === 0) {
                list.innerHTML = `<p class="text-sm text-gray-400 italic col-span-full">${t('empty_goals')}</p>`;
                return;
            }

            goals.forEach(goal => {
                const percent = Math.min(100, Math.round((goal.progress / goal.target) * 100)) || 0;
                const div = document.createElement('div');
                div.className = "border border-gray-100 bg-brand-bg/40 rounded-xl p-4 flex flex-col justify-between";
                div.innerHTML = `
                    <div>
                        <div class="flex justify-between items-start mb-3">
                            <div class="flex items-center gap-2">
                                <div class="p-2 bg-white rounded-lg text-brand-primary shadow-sm border border-gray-50"><i data-lucide="${getGoalIcon(goal.type)}" class="w-4 h-4"></i></div>
                                <div>
                                    <h4 class="text-sm font-bold text-brand-sidebar capitalize">${t('goal_type_' + goal.type)}</h4>
                                    <p class="text-xs text-gray-500">${t('goal_by')} ${goal.date}</p>
                                </div>
                            </div>
                            <span class="text-xs font-bold px-2 py-1 rounded bg-white border border-gray-100 shadow-sm ${percent >= 100 ? 'text-green-500' : 'text-brand-primary'}">${percent}%</span>
                        </div>
                    </div>
                    <div class="mt-4">
                        <div class="flex justify-between text-xs text-gray-500 mb-1 font-medium">
                            <span>${goal.progress.toLocaleString(localeString)}</span>
                            <span>${goal.target.toLocaleString(localeString)}</span>
                        </div>
                        <div class="w-full bg-gray-200/80 rounded-full h-1.5">
                            <div class="bg-brand-primary h-1.5 rounded-full transition-all duration-1000 ease-out" style="width: ${percent}%"></div>
                        </div>
                    </div>
                `;
                list.appendChild(div);
            });
            lucide.createIcons();
        };

        window.openGoalModal = () => {
            const modal = document.getElementById('goalModal');
            const content = document.getElementById('goalModalContent');
            modal.classList.remove('hidden');
            setTimeout(() => { content.classList.remove('scale-95', 'opacity-0'); content.classList.add('scale-100', 'opacity-100'); }, 10);
        };

        window.closeGoalModal = () => {
            const modal = document.getElementById('goalModal');
            const content = document.getElementById('goalModalContent');
            content.classList.remove('scale-100', 'opacity-100'); content.classList.add('scale-95', 'opacity-0');
            setTimeout(() => { modal.classList.add('hidden'); document.getElementById('goalForm').reset(); }, 200); 
        };

        document.getElementById('goalModal').addEventListener('mousedown', (e) => { if(e.target.id === 'goalModal') closeGoalModal(); });

        document.getElementById('goalForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const type = document.getElementById('goalType').value;
            const target = parseInt(document.getElementById('goalTarget').value);
            const date = document.getElementById('goalDate').value;
            
            let startingProgress = 0;
            if (type === 'contacts') startingProgress = 14582;
            if (type === 'organizations') startingProgress = 2104;
            if (type === 'messages') startingProgress = 89345;
            if (type === 'tasks') startingProgress = 4530;
            
            goals.push({ id: Date.now(), type: type, target: target, date: date, progress: startingProgress });
            renderGoals(); closeGoalModal();
        });


        // --- Initialization on Load ---
        window.addEventListener('DOMContentLoaded', () => {
            // 1. Apply translations immediately
            applyTranslations();
            
            // Initialize initial task list with translations
            tasks = [
                { id: 1, text: t("task_1"), date: new Date().toISOString().split('T')[0], completed: false, isEditing: false },
                { id: 2, text: t("task_2"), date: "2026-05-10", completed: true, isEditing: false },
                { id: 3, text: t("task_3"), date: "2026-05-02", completed: false, isEditing: false }
            ];

            // 2. Init components
            animateCounters();
            initCharts();
            initMap();
            generateHeatmap();
            renderTasks();
            renderGoals();

            // 3. Reveal the body (Fade in effect, hides language swap)
            document.getElementById('main-body').classList.remove('opacity-0');

            // Scrollbar Cursor logic
            document.querySelectorAll('.custom-scrollbar').forEach(el => {
                el.addEventListener('mousemove', (e) => {
                    const isHoveringHorizontal = el.scrollWidth > el.clientWidth && (e.offsetY >= el.clientHeight);
                    const isHoveringVertical = el.scrollHeight > el.clientHeight && (e.offsetX >= el.clientWidth);
                    el.style.cursor = (isHoveringHorizontal || isHoveringVertical) ? 'grab' : 'default';
                });
                el.addEventListener('mousedown', () => { if (el.style.cursor === 'grab') el.style.cursor = 'grabbing'; });
                el.addEventListener('mouseup', () => { if (el.style.cursor === 'grabbing') el.style.cursor = 'grab'; });
                el.addEventListener('mouseleave', () => { el.style.cursor = 'default'; });
            });
        });
    </script>
</body>
</html>
