  <!-- ICONS CODE -->
    <script> 
        function removeFromLinks(rel) {
            for (link of document.head.getElementsByTagName("link")) {
                if (link.rel == rel) {
                    document.head.removeChild(link);
                }
            };
        }
        function createNewFavicon(rel, img) {
            var newFavicon = document.createElement("link");
            newFavicon.type = "image/png";
            newFavicon.rel = rel;
            newFavicon.href = img;
            var firstHeadElement = document.head.firstChild;
            document.head.insertBefore(newFavicon, firstHeadElement);
        }
        removeFromLinks("icon");
        removeFromLinks("shortcut icon");
        removeFromLinks("apple-touch-icon");
        createNewFavicon("icon", "https://bucket.mlcdn.com/a/3336/3336910/images/ba48dc6c14746407eea5796b6d07e1b22022eaf4.png");
        createNewFavicon("shortcut icon", "https://bucket.mlcdn.com/a/3336/3336910/images/ba48dc6c14746407eea5796b6d07e1b22022eaf4.png");
        createNewFavicon("apple-touch-icon", "https://bucket.mlcdn.com/a/3336/3336910/images/ba48dc6c14746407eea5796b6d07e1b22022eaf4.png"); 
    </script>
