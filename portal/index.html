
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Ciberespacial - Bebell Digital Solutions</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://cdn.shopify.com/s/files/1/0242/0175/6777/files/Logo_Bebell_-_1.gif?v=1777150054">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        /* Default modular variables (overridden via JS from database) */
        --primary-color: #8b84f4; 
        --primary-rgb: 223, 32, 38;
        
        --secondary-color: #ff7b00; 
        --tertiary-color: #ffce00; 
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: url("https://bucket.mlcdn.com/a/3336/3336910/images/810a8c44f8aab679755faa62e09c7dfa37ad7f71.png") no-repeat center center fixed;
        background-size: cover;
        background-color: #0a0a0a;
        font-family: "Unica One", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        position: relative;
        perspective: 2000px;
      }

      /* Loader Screen */
      #appLoader {
        position: fixed;
        inset: 0;
        background: #f1f0fb;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.6s ease;
      }
      .hiddenLoader {
        opacity: 0;
        pointer-events: none;
      }
      .spinner {
        border: 4px solid rgba(255,255,255,0.1);
        border-left-color: var(--primary-color);
        border-radius: 50%;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin-bottom: 20px;
      }
      @keyframes spin { 100% { transform: rotate(360deg); } }
      .loader-text {
        font-family: 'Poppins', sans-serif;
        color: white;
        letter-spacing: 2px;
        font-size: 14px;
        text-transform: uppercase;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

      /* Background Stars Canvas */
      #bgStarsCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        pointer-events: none;
      }

      /* 2-Column Main Container */
      #mainUI {
        position: absolute;
        width: 90%;
        max-width: 1000px;
        min-height: 550px;
        height: auto;
        background: #ffffff;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 20px;
        border: 0px solid rgba(var(--primary-rgb), 0.5);
        box-shadow: 0 0 30px rgba(var(--primary-rgb), 0.3),
                    0 0 50px rgba(0, 0, 0, 0.5),
                    inset 0 0 20px rgba(var(--primary-rgb), 0.1);
        display: flex;
        transition: all 0.5s cubic-bezier(0.1, 1, 0.1, 1);
        z-index: 10;
        overflow: hidden;
        transform-style: preserve-3d;
      }

      #mainUI::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 19px;
        padding: 1px;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color), var(--tertiary-color));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0.7;
        pointer-events: none;
        z-index: 2;
      }

      /* Left Column */
      .left-col {
        flex: 1;
        padding: 60px 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        position: relative;
        z-index: 5;
      }

      #greetingText {
        font-family: 'Poppins', sans-serif;
        color: var(--primary-color);
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 5px;
      }

      .left-col h1 {
        font-family: 'Poppins', sans-serif;
        color: #0a0a0a;
        font-weight: 700;
        font-size: 40px;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: none;
        line-height: 1.1;
      }

      .left-col p.description {
        color: #4a4a4a;
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 30px;
        font-weight: 300;
        text-shadow: none;
      }

      /* Right Column */
      .right-col {
        flex: 1;
        position: relative;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      .image-banner {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .right-col:hover .image-banner {
        transform: scale(1.15);
      }

      .right-col::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 30%);
        pointer-events: none;
      }

      /* Button Styles */
      #portalButton {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.5;
        padding: 16px 40px;
        background: var(--primary-color);
        border: 2px solid var(--primary-color);
        border-radius: 50px;
        color: white;
        font-family: "Poppins", sans-serif;
        font-weight: 500;
        font-size: 18px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        z-index: 20;
        overflow: hidden;
        box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.6);
        text-shadow: 0 0 3px rgba(0, 0, 0, 0.4);
        margin-bottom: 20px;
      }

      #portalButton::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.2));
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: -1;
      }

      #portalButton:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(var(--primary-rgb), 0.9);
        border-color: var(--primary-color);
      }

      #portalButton:hover::before {
        opacity: 1;
      }

      /* Footer Credits */
      .credits {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        color: rgba(0, 0, 0, 0.5);
        position: absolute;
        bottom: 30px;
      }

      .brand-logo {
        width: 100px;
        height: 100px;
        object-fit: contain;
        margin-bottom: 15px;
        transform-origin: left;
      }

      /* Fade Out Animation */
      #mainUI.fadeOut {
        animation: fadeOut 0.5s forwards cubic-bezier(0.55, 0.085, 0.68, 0.53);
      }

      @keyframes fadeOut {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(1.3); }
      }

      /* Overlays */
      .logo-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.5);
        width: 80vw;
        height: 80vw;
        max-width: 600px;
        max-height: 600px;
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0;
        z-index: 1001;
        pointer-events: none;
        transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1.5s ease-out;
      }

      .logo-overlay.visible {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .logo-overlay.fade-out {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.2);
      }

      .color-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: var(--primary-color);
        opacity: 0;
        z-index: 1000;
        pointer-events: none;
        transition: opacity 0.5s ease-out;
      }

      /* Language Toggle Button */
      #langToggle {
        position: fixed;
        top: 30px;
        right: 30px;
        width: 55px;
        height: 55px;
        background-color: var(--primary-color);
        border: none;
        border-radius: 50%;
        cursor: pointer;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
      }

      #langToggle img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      #langToggle:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.8);
      }

      /* =========================================
         RESPONSIVE MEDIA QUERIES 
         ========================================= */
      @media (max-width: 1024px) {
        .left-col { padding: 50px 40px; }
        .left-col h1 { font-size: 34px; }
        .brand-logo { width: 85px; height: 85px; }
        #portalButton { padding: 14px 34px; font-size: 16px; }
      }

      @media (max-width: 768px) {
        #mainUI { flex-direction: column; width: 90%; min-height: auto; height: auto; max-height: 90vh; overflow-y: auto; }
        .left-col { padding: 40px 30px 30px 30px; align-items: center; text-align: center; }
        .brand-logo { transform-origin: center; margin-bottom: 20px; }
        .left-col h1 { font-size: 28px; margin-bottom: 15px; }
        .left-col p.description { font-size: 15px; margin-bottom: 25px; }
        #portalButton { padding: 14px 30px; margin-bottom: 10px; }
        .credits { position: relative; bottom: auto; margin-top: 25px; }
        .right-col { height: 250px; flex: none; width: 100%; }
        .right-col::after { background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 40%); }
        #langToggle { top: 15px; right: 15px; width: 45px; height: 45px; padding: 8px; }
      }

      @media (max-width: 480px) {
        .left-col { padding: 30px 20px 25px 20px; }
        .brand-logo { width: 150px; height: 150px; }
        .left-col h1 { font-size: 24px; }
        .left-col p.description { font-size: 16px; }
        #portalButton { padding: 12px 28px; font-size: 15px; }
        .right-col { height: 500px; }
      }
    </style>
</head>
<body>

    <!-- Dynamic Loader -->
    <div id="appLoader">
        <div class="spinner"></div>
        <p class="loader-text">Loading Workspace...</p>
    </div>

    <!-- Background Twinkling Stars -->
    <canvas id="bgStarsCanvas"></canvas>

    <!-- Language Toggle Button -->
    <button id="langToggle" title="Cambiar Idioma / Change Language">
        <img src="https://bucket.mlcdn.com/a/3336/3336910/images/0f2b86795908b6c49e39a13a4c1191c19f498de1.png" alt="Translate">
    </button>

    <!-- 2 Column Layout Container -->
    <div id="mainUI">

        
        
        <div class="left-col">
            <!-- Dynamic Logo -->
            <img id="dynamicLogo" src="https://via.placeholder.com/150" alt="Brand Logo" class="brand-logo" style="opacity: 0;">

            <div id="greetingText"></div>
            <h1 id="mainTitle">BIENVENIDO AL<br>CONTROL TOTAL DE TU OPERACIÓN</h1>
            <p class="description" id="mainDesc">Vende repuestos, gestiona pedidos y comunícate con tus clientes desde un solo sistema.<br>Sin intermediarios. Sin fricción. Con control absoluto.</p>
            
            <button id="portalButton">ACCEDER AHORA</button>
            
            <p class="credits" id="mainCredits">Desarrollado con 💖 por Bebell Digital Solutions</p>
        </div>

        

        <div class="right-col">
            <!-- Dynamic Image Banner -->
            <img id="dynamicBanner" src="https://images.unsplash.com/photo-1557683316-973673baf926?q=80&w=2000&auto=format&fit=crop" alt="Organization Banner" class="image-banner">
        </div>

    </div>






    

    <!-- Hidden Tunnel Canvas -->
    <canvas id="tunnelCanvas" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 999;"></canvas>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ==========================================
        // 🛠 API & INITIALIZATION LOGIC
        // ==========================================
        const API_URL = "https://script.google.com/macros/s/AKfycbwRX3698t_naJ2Ff740DQxthe7L6-1Quo5X6vmq5HVadTJP1rAEsdL5NwDY7rtijHZjJw/exec"; // <-- Update This!
        
        const urlParams = new URLSearchParams(window.location.search);
        const uid = urlParams.get('uid');
        const username = urlParams.get('username') || '';
        const userEmail = urlParams.get('email') || 'anonymous@portal.com';

        let orgData = {
            primaryColor: '#df2026',
            logoUrl: 'https://bucket.mlcdn.com/a/3336/3336910/images/3f064b65239edc2009b3464019f3538974cbdf28.png', // Default Fallback
            tunnelLogoUrl: '',
            title: '',
            description: '',
            tunnelBgColor: '#df2026',
            tunnelLineColor: '#ffffff',
            dashboardName: ''
        };

        // Translations Dictionary
        const translations = {
            es: {
                greeting: username ? `HOLA, ${username}` : '',
                title: "BIENVENIDO AL<br>CONTROL TOTAL DE TU OPERACIÓN",
                desc: "Vende repuestos, gestiona pedidos y comunícate con tus clientes desde un solo sistema.<br>Sin intermediarios. Sin fricción. Con control absoluto.",
                btn: "ACCEDER AHORA",
                credits: "Desarrollado con 💖 por Bebell Digital Solutions",
                url: "https://bebell-digital-solutions.github.io/ai-automation/es-demo"
            },
            en: {
                greeting: username ? `WELCOME, ${username}` : '',
                title: "WELCOME TO THE<br>TOTAL CONTROL OF YOUR OPERATION",
                desc: "Sell spare parts, manage orders, and communicate with your customers from a single system.<br>No middlemen. No friction. With absolute control.",
                btn: "ENTER NOW",
                credits: "Powered with 💖 by Bebell Digital Solutions",
                url: "https://bebell-digital-solutions.github.io/ai-automation/en-demo"
            }
        };

        let currentLang = 'es';

        // Load dynamic data from Backend
        async function loadPortalData() {
            if(username) {
                document.getElementById('greetingText').innerText = translations[currentLang].greeting;
            }

            if(uid) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({ action: 'getPortalData', uid: uid })
                    });
                    const result = await response.json();
                    
                    if (result.success && result.data) {
                        const d = result.data;
                        orgData = d;
                        
                        // 1. Update Images
                        const logoEl = document.getElementById('dynamicLogo');
                        logoEl.src = d.logoUrl || orgData.logoUrl;
                        logoEl.style.opacity = '1';

                        if(d.bannerUrl) {
                            document.getElementById('dynamicBanner').src = d.bannerUrl;
                        }

                        // 2. Update Colors dynamically
                        if(d.primaryColor) {
                            document.documentElement.style.setProperty('--primary-color', d.primaryColor);
                            // Convert Hex to RGB for shadows
                            let hex = d.primaryColor.replace('#', '');
                            if (hex.length === 3) hex = hex[0]+hex[0]+hex[1]+hex[1]+hex[2]+hex[2];
                            const r = parseInt(hex.substring(0, 2), 16);
                            const g = parseInt(hex.substring(2, 4), 16);
                            const b = parseInt(hex.substring(4, 6), 16);
                        document.documentElement.style.setProperty('--primary-rgb', `${r}, ${g}, ${b}`);
                    }

                    // 3. Apply new modular fields (Title, Desc)
                    if(d.title) document.getElementById('mainTitle').innerHTML = d.title;
                    if(d.description) document.getElementById('mainDesc').innerHTML = d.description;

                    // 4. Update Titles (Optional Override)
                    if(d.dashboardName) {
                        document.title = `${d.dashboardName} - Portal`;
                            // You can inject d.dashboardName into the HTML here if desired.
                        }
                    }
                } catch (error) {
                    console.error("Error fetching portal setup.", error);
                    document.getElementById('dynamicLogo').src = orgData.logoUrl;
                    document.getElementById('dynamicLogo').style.opacity = '1';
                }
            } else {
                document.getElementById('dynamicLogo').src = orgData.logoUrl;
                document.getElementById('dynamicLogo').style.opacity = '1';
            }

            // Hide the loader gracefully
            setTimeout(() => {
                document.getElementById('appLoader').classList.add('hiddenLoader');
            }, 500);
        }

        // ==========================================
        // 🎥 VISUALS & ANIMATIONS
        // ==========================================

        // Background Twinkling Stars
        const bgCanvas = document.getElementById('bgStarsCanvas');
        const ctx = bgCanvas.getContext('2d');
        let bgStars = [];

        function initBgStars() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            bgStars = [];
            for(let i = 0; i < 200; i++) {
                bgStars.push({
                    x: Math.random() * bgCanvas.width, y: Math.random() * bgCanvas.height,
                    radius: Math.random() * 1.5, opacity: Math.random(),
                    speed: (Math.random() * 0.015) + 0.005, direction: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function animateBgStars() {
            ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgStars.forEach(star => {
                star.opacity += star.speed * star.direction;
                if(star.opacity >= 1) { star.opacity = 1; star.direction = -1; } 
                else if(star.opacity <= 0.1) { star.opacity = 0.1; star.direction = 1; }
                
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animateBgStars);
        }

        initBgStars(); animateBgStars();
        window.addEventListener('resize', initBgStars);

        // Sound Effect
        const cinematicWhip = new Audio('https://cdn.shopify.com/s/files/1/0242/0175/6777/files/mixkit-futuristic-cinematic-noise-whip-1518.wav?v=1748880406');
        cinematicWhip.preload = 'auto'; cinematicWhip.load();

        let animationId = null;
        let renderer, scene, camera, tube, stars;

        function fadeAudio(audioElement, targetVolume, duration) {
            const initialVolume = audioElement.volume;
            const delta = targetVolume - initialVolume;
            const startTime = Date.now();
            function updateVolume() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                audioElement.volume = initialVolume + delta * progress;
                if (progress < 1) requestAnimationFrame(updateVolume);
            }
            updateVolume();
        }

        // ==========================================
        // 🚀 ACTION & ACTIVITY LOGGING
        // ==========================================

        const mainUI = document.getElementById("mainUI");
        const button = document.getElementById("portalButton");
        const canvasTunnel = document.getElementById("tunnelCanvas");

        button.addEventListener("click", startPortal);

        function startPortal() {
            // 1. Log Activity asynchronously (Doesn't block animation)
            if(uid) {
                fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        action: 'logActivity', 
                        email: userEmail, 
                        activity: `Portal Accedido. UID: ${uid}` 
                    })
                }).catch(e => console.error("Logging sync error"));
            }

            // 2. Play Sound
            cinematicWhip.currentTime = 0;
            cinematicWhip.volume = 1.0;
            cinematicWhip.play();
            
            // 3. UI Disappearance
            mainUI.classList.add("fadeOut");
            setTimeout(() => mainUI.remove(), 500);
            
            // 4. Fire up Three.js tunnel
            canvasTunnel.style.display = "block";
            initTunnel();
            
            // Overlays Setup
            const colorOverlay = document.createElement("div");
            colorOverlay.className = "color-overlay";
            document.body.appendChild(colorOverlay);
            
            const logoOverlay = document.createElement("div");
            logoOverlay.className = "logo-overlay";
            logoOverlay.style.backgroundImage = `url('${orgData.tunnelLogoUrl || orgData.logoUrl}')`; // Use Tunnel Logo if available
            document.body.appendChild(logoOverlay);
            
            // Animation Timeline
            setTimeout(() => {
                colorOverlay.style.opacity = "0.1";
                
                const colorFadeInterval = setInterval(() => {
                    const currentOpacity = parseFloat(colorOverlay.style.opacity || "0");
                    if (currentOpacity < 1) colorOverlay.style.opacity = (currentOpacity + 0.05).toString();
                    else clearInterval(colorFadeInterval);
                }, 50);
                
                setTimeout(() => logoOverlay.classList.add("visible"), 500);
                
                setTimeout(() => {
                    cleanupTunnel();
                    colorOverlay.style.backgroundColor = orgData.tunnelBgColor; 
                }, 2000);
                
                setTimeout(() => fadeAudio(cinematicWhip, 0, 500), 2500);
                setTimeout(() => logoOverlay.classList.add("fade-out"), 3000);
                
                // 5. Final Redirect mapping URL params
                setTimeout(() => {
    // Uses the unique URL from the Backend!
    const finalDest = orgData.dashboardUrl || (translations[currentLang].url + window.location.search);
    window.location.href = finalDest;
}, 3500);
            }, 1000);
        }

        // Language Toggle Logic
        const langToggleBtn = document.getElementById('langToggle');
        const mainTitle = document.getElementById('mainTitle');
        const mainDesc = document.getElementById('mainDesc');
        const mainCredits = document.getElementById('mainCredits');
        const greetingText = document.getElementById('greetingText');

        langToggleBtn.addEventListener('click', () => {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            greetingText.innerHTML = translations[currentLang].greeting;
            
            // Prevent overriding custom DB content with default translations
            if(!orgData.title) mainTitle.innerHTML = translations[currentLang].title;
            if(!orgData.description) mainDesc.innerHTML = translations[currentLang].desc;
            
            button.innerHTML = translations[currentLang].btn; 
            mainCredits.innerHTML = translations[currentLang].credits;
        });

        // ==========================================
        // 🌌 THREE.JS TUNNEL IMPLEMENTATION
        // ==========================================
        function initTunnel() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            renderer = new THREE.WebGLRenderer({ canvas: canvasTunnel, antialias: true, alpha: false });
            renderer.setSize(w, h);
            
            // Sync background to the dynamic tunnel bg color
            renderer.setClearColor(orgData.tunnelBgColor, 1); 
            
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(orgData.tunnelBgColor, 0.005); 
            
            camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
            const path = createCircularPath();
            const tubeGeometry = new THREE.TubeGeometry(path, 200, 3, 12, false);
            
            const material = new THREE.MeshBasicMaterial({ side: THREE.BackSide, wireframe: true, color: new THREE.Color(orgData.tunnelLineColor), transparent: true, opacity: 0.8 });
            tube = new THREE.Mesh(tubeGeometry, material);
            scene.add(tube);
            
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 1, transparent: true });
            
            const starsPositions = new Float32Array(2000 * 3);
            for (let i = 0; i < 2000; i++) {
                starsPositions[i * 3] = (Math.random() - 0.5) * 2000;
                starsPositions[i * 3 + 1] = (Math.random() - 0.5) * 2000;
                starsPositions[i * 3 + 2] = (Math.random() - 0.5) * 2000;
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
            stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
            
            let pct = 0; const duration = 2.5; const startTime = Date.now();
            
            function animate() {
                const elapsed = (Date.now() - startTime) / 1000;
                pct = Math.min(elapsed / duration, 1);
                const lookAheadPct = Math.min(pct + 0.01, 1);
                const pt1 = path.getPointAt(pct);
                const pt2 = path.getPointAt(lookAheadPct);
                
                camera.position.set(pt1.x, pt1.y, pt1.z);
                camera.lookAt(pt2);
                renderer.render(scene, camera);
                
                if (pct < 1) animationId = requestAnimationFrame(animate);
            }
            animate();
            
            window.addEventListener('resize', () => {
                const w = window.innerWidth, h = window.innerHeight;
                camera.aspect = w / h; camera.updateProjectionMatrix(); renderer.setSize(w, h);
            });
        }

        function cleanupTunnel() {
            if (animationId) cancelAnimationFrame(animationId);
            if (renderer) renderer.dispose();
            if (scene) { while(scene.children.length > 0){ scene.remove(scene.children[0]); } }
            if (canvasTunnel) canvasTunnel.style.display = "none";
        }

        function createCircularPath() {
            const points = [];
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 0, 0), new THREE.Vector3(20, 10, -50), new THREE.Vector3(40, -10, -100),
                new THREE.Vector3(60, 15, -150), new THREE.Vector3(50, -5, -200), new THREE.Vector3(0, 0, -250),
                new THREE.Vector3(-100, 0, -200), new THREE.Vector3(-150, 0, -100), new THREE.Vector3(-100, 0, 0),
                new THREE.Vector3(-50, 10, 100), new THREE.Vector3(-20, -10, 150), new THREE.Vector3(0, 0, 200)
            ]);
            curve.tension = 0.1;
            for (let i = 0; i < 200; i++) { const t = i / 199; points.push(curve.getPointAt(t)); }
            return curve;
        }

        // Initialize App
        window.onload = loadPortalData;
    </script>
</body>
