<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Cedaky Mall - Presentación Bebell Digital Solutions</title>
    
    <!-- Favicon -->
    <link rel="icon" href="https://cdn.shopify.com/s/files/1/0242/0175/6777/files/Logo_Bebell_-_1.gif?v=1777150054">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Unica+One&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --title: "Portal Ciberespacial hacia la Automatización con IA";
        --autor: "Bebell Digital Solutions";
        --contact: "info@html-lab.net";
        --primary-color: #016fe9; /* Brand Blue */
        --primary-rgb: 1, 111, 233;
        --secondary-color: #7ac124; /* Brand Green */
        --secondary-rgb: 122, 193, 36;
        --tertiary-color: #ffce00; /* Brand Yellow */
        --tertiary-rgb: 255, 206, 0;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        overflow: hidden;
        background: url("https://bucket.mlcdn.com/a/3336/3336910/images/810a8c44f8aab679755faa62e09c7dfa37ad7f71.png") no-repeat center center fixed;
        background-size: cover;
        background-color: #0a0a0a;
        font-family: "Unica One", sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        position: relative;
        perspective: 2000px;
      }

      /* Background Stars Canvas */
      #bgStarsCanvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: 1;
        pointer-events: none;
      }

      /* 2-Column Main Container */
      #mainUI {
        position: absolute;
        width: 90%;
        max-width: 1000px;
        height: 500px;
        background: #ffffff;
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border-radius: 20px;
        border: 1px solid rgba(var(--primary-rgb), 0.5);
        box-shadow: 0 0 30px rgba(var(--primary-rgb), 0.3),
                    0 0 50px rgba(0, 0, 0, 0.5),
                    inset 0 0 20px rgba(var(--primary-rgb), 0.1);
        display: flex;
        transition: all 0.5s cubic-bezier(0.1, 1, 0.1, 1);
        z-index: 10;
        overflow: hidden;
        transform-style: preserve-3d;
      }

      #mainUI::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 19px;
        padding: 1px;
        background: linear-gradient(135deg, var(--primary-color), var(--secondary-color), var(--tertiary-color));
        -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
        -webkit-mask-composite: xor;
        mask-composite: exclude;
        opacity: 0.7;
        pointer-events: none;
        z-index: 2;
      }

      /* Left Column */
      .left-col {
        flex: 1;
        padding: 60px 50px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: flex-start;
        position: relative;
        z-index: 5;
      }

      .left-col h1 {
        font-family: 'Poppins', sans-serif;
        color: #0a0a0a;
        font-weight: 700;
        font-size: 45px;
        margin-bottom: 20px;
        text-transform: uppercase;
        letter-spacing: 1px;
        text-shadow: none;
        line-height: 1.1;
      }

      .left-col p.description {
        color: #4a4a4a;
        font-family: 'Inter', sans-serif;
        font-size: 16px;
        line-height: 1.6;
        margin-bottom: 30px;
        font-weight: 300;
        text-shadow: none;

      }

      /* Right Column */
      .right-col {
        flex: 1;
        position: relative;
        overflow: hidden;
      }

      .image-banner {
        width: 100%;
        height: 100%;
        object-fit: cover;
        transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      }

      .right-col:hover .image-banner {
        transform: scale(1.15);
      }

      .right-col::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 30%);
        pointer-events: none;
      }

      /* Button Styles */
      #portalButton {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        line-height: 1.5;
        padding: 28px 38px;
        background: var(--primary-color);
        border: 2px solid var(--primary-color);
        border-radius: 50px;
        color: white;
        font-family: "Poppins", sans-serif;
        font-weight: 400;
        font-size: 22px;
        letter-spacing: 1px;
        cursor: pointer;
        transition: all 0.2s ease;
        position: relative;
        z-index: 20;
        overflow: hidden;
        box-shadow: 0 0 15px rgba(var(--primary-rgb), 0.6);
        text-shadow: 0 0 3px rgba(0, 0, 0, 0.4);
        margin-bottom: 40px;
      }

      #portalButton::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, rgba(255,255,255,0.1), rgba(255,255,255,0.2));
        opacity: 0;
        transition: opacity 0.2s ease;
        z-index: -1;
      }

      #portalButton:hover {
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(var(--primary-rgb), 0.9);
        border-color: #4da3ff;
      }

      #portalButton:hover::before {
        opacity: 1;
      }

      /* Footer Credits */
      .credits {
        font-family: 'Inter', sans-serif;
        font-size: 11px;
        color: rgba(0, 0, 0, 0.5);
        position: absolute;
        bottom: 30px;
      }

      .brand-logo {
        width: 70px;
        height: 70px;
        object-fit: contain;
        margin-bottom: 15px;
      }

      /* Fade Out Animation */
      #mainUI.fadeOut {
        animation: fadeOut 0.5s forwards cubic-bezier(0.55, 0.085, 0.68, 0.53);
      }

      @keyframes fadeOut {
        from { opacity: 1; transform: scale(1); }
        to { opacity: 0; transform: scale(1.3); }
      }

      /* Overlays */
      .logo-overlay {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0.5);
        /* Updated constraints for responsive behavior */
        width: 80vw;
        height: 80vw;
        max-width: 600px;
        max-height: 600px;
        background-image: url('https://bucket.mlcdn.com/a/3336/3336910/images/4d39653308e9c830cbd2af597cbf8061fa202285.png');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center;
        opacity: 0;
        z-index: 1001;
        pointer-events: none;
        transition: transform 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 1.5s ease-out;
      }

      .logo-overlay.visible {
        opacity: 1;
        transform: translate(-50%, -50%) scale(1);
      }

      .logo-overlay.fade-out {
        opacity: 0;
        transform: translate(-50%, -50%) scale(1.2);
      }

      .color-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: #021851;
        opacity: 0;
        z-index: 1000;
        pointer-events: none;
        transition: opacity 0.5s ease-out;
      }

      /* Language Toggle Button */
      #langToggle {
        position: fixed;
        top: 30px;
        right: 30px;
        width: 55px;
        height: 55px;
        background-color: var(--primary-color);
        border: none;
        border-radius: 50%;
        cursor: pointer;
        z-index: 1000;
        box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 10px;
      }

      #langToggle img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      #langToggle:hover {
        transform: scale(1.1);
        box-shadow: 0 0 20px rgba(var(--primary-rgb), 0.8);
      }

      /* =========================================
         RESPONSIVE MEDIA QUERIES 
         ========================================= */

      /* Tablets / Small Desktops */
      @media (max-width: 1024px) {
        .left-col {
          padding: 50px 40px;
        }
        .left-col h1 {
          font-size: 34px;
        }
        .brand-logo {
          width: 85px;
          height: 85px;
        }
        #portalButton {
          padding: 14px 34px;
          font-size: 16px;
        }
      }

      /* Mobile Devices */
      @media (max-width: 768px) {
        #mainUI {
          flex-direction: column;
          width: 90%;
          min-height: auto;
          height: auto;
          max-height: 90vh;
          overflow-y: auto;
        }
        .left-col {
          padding: 40px 30px 30px 30px;
          align-items: center;
          text-align: center;
        }
        .brand-logo {
          transform-origin: center;
          margin-bottom: 20px;
        }
        .left-col h1 { 
          font-size: 28px; 
          margin-bottom: 15px;
        }
        .left-col p.description {
          font-size: 15px;
          margin-bottom: 25px;
        }
        #portalButton {
          padding: 14px 30px;
          margin-bottom: 10px;
        }
        .credits {
          position: relative;
          bottom: auto;
          margin-top: 25px;
        }
        .right-col {
          height: 250px;
          flex: none;
          width: 100%;
        }
        .right-col::after {
          background: linear-gradient(180deg, rgba(255,255,255,1) 0%, rgba(255,255,255,0) 40%);
        }
        #langToggle {
          top: 15px;
          right: 15px;
          width: 45px;
          height: 45px;
          padding: 8px;
        }
      }

      /* Small Mobile Devices (e.g. iPhone SE, older phones) */
      @media (max-width: 480px) {
        .left-col {
          padding: 30px 20px 25px 20px;
        }
        .brand-logo {
          width: 150px;
          height: 150px;
        }
        .left-col h1 {
          font-size: 24px;
        }
        .left-col p.description {
          font-size: 16px;
        }
        #portalButton {
          padding: 12px 28px;
          font-size: 15px;
        }
        .right-col {
          height: 500px;
        }
      }
    </style>
</head>
<body>

    <!-- Background Twinkling Stars -->
    <canvas id="bgStarsCanvas"></canvas>

    <!-- Language Toggle Button -->
    <button id="langToggle" title="Cambiar Idioma / Change Language">
        <img src="https://bucket.mlcdn.com/a/3336/3336910/images/0f2b86795908b6c49e39a13a4c1191c19f498de1.png" alt="Translate">
    </button>

    <!-- 2 Column Layout Container -->
    <div id="mainUI">
        
        <div class="left-col">
            <img src="https://bucket.mlcdn.com/a/3336/3336910/images/4d39653308e9c830cbd2af597cbf8061fa202285.png" alt="Logo" class="brand-logo">

            <h1 id="mainTitle">BIENVENIDO AL<br>FUTURO DEL RETAIL</h1>
            <p class="description" id="mainDesc">Una nueva forma de conectar con tus visitantes, transformar su experiencia y abrir oportunidades más allá del espacio físico.<br>Lo que hoy es un mall, mañana puede ser mucho más.</p>
            
            <button id="portalButton">ACCEDER AHORA</button>
            
            <p class="credits" id="mainCredits">Desarrollado con 💖 por Bebell Digital Solutions</p>
        </div>

        <div class="right-col">
            <!-- Image Banner with Hover Effect -->
            <img src="https://bucket.mlcdn.com/a/3336/3336910/images/aa304a480f469583df05b5d6e066bcec3aad770d.png" alt="Cedaky Mall" class="image-banner">
        </div>

    </div>

    <!-- Hidden Tunnel Canvas -->
    <canvas id="tunnelCanvas" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 999;"></canvas>

    <!-- Three.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // Background Twinkling Stars Logic
        const bgCanvas = document.getElementById('bgStarsCanvas');
        const ctx = bgCanvas.getContext('2d');
        let bgStars = [];

        function initBgStars() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
            bgStars = [];
            // Create 200 random stars
            for(let i = 0; i < 200; i++) {
                bgStars.push({
                    x: Math.random() * bgCanvas.width,
                    y: Math.random() * bgCanvas.height,
                    radius: Math.random() * 1.5,
                    opacity: Math.random(),
                    speed: (Math.random() * 0.015) + 0.005,
                    direction: Math.random() > 0.5 ? 1 : -1
                });
            }
        }

        function animateBgStars() {
            ctx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgStars.forEach(star => {
                // Twinkling effect
                star.opacity += star.speed * star.direction;
                if(star.opacity >= 1) {
                    star.opacity = 1;
                    star.direction = -1;
                } else if(star.opacity <= 0.1) {
                    star.opacity = 0.1;
                    star.direction = 1;
                }
                
                // Draw star
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.radius, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255, 255, 255, ${star.opacity})`;
                ctx.fill();
            });
            requestAnimationFrame(animateBgStars);
        }

        // Initialize and start background animation
        initBgStars();
        animateBgStars();
        window.addEventListener('resize', initBgStars);


        // Single Sound Effect
        const cinematicWhip = new Audio('https://cdn.shopify.com/s/files/1/0242/0175/6777/files/mixkit-futuristic-cinematic-noise-whip-1518.wav?v=1748880406');
        cinematicWhip.preload = 'auto';
        cinematicWhip.load();

        // Animation control variables
        let animationId = null;
        let renderer, scene, camera, tube, stars;

        // Audio helper function
        function fadeAudio(audioElement, targetVolume, duration) {
            const initialVolume = audioElement.volume;
            const delta = targetVolume - initialVolume;
            const startTime = Date.now();
            
            function updateVolume() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / duration, 1);
                audioElement.volume = initialVolume + delta * progress;
                
                if (progress < 1) {
                    requestAnimationFrame(updateVolume);
                }
            }
            updateVolume();
        }

        // Portal elements
        const mainUI = document.getElementById("mainUI");
        const button = document.getElementById("portalButton");
        const canvasTunnel = document.getElementById("tunnelCanvas");

        // Only trigger on Button Click to prevent accidental triggers on the text/image
        button.addEventListener("click", startPortal);

        // Main portal function
        function startPortal() {
            // Play cinematic whip sound immediately on click
            cinematicWhip.currentTime = 0;
            cinematicWhip.volume = 1.0;
            cinematicWhip.play();
            
            // Container disappearance animation
            mainUI.classList.add("fadeOut");
            setTimeout(() => {
                mainUI.remove();
            }, 500);
            
            // Visual setup
            canvasTunnel.style.display = "block";
            
            // Initialize Three.js tunnel
            initTunnel();
            
            // Create color overlay and logo elements
            const colorOverlay = document.createElement("div");
            colorOverlay.className = "color-overlay";
            document.body.appendChild(colorOverlay);
            
            const logoOverlay = document.createElement("div");
            logoOverlay.className = "logo-overlay";
            document.body.appendChild(logoOverlay);
            
            // Animation timeline
            setTimeout(() => {
                colorOverlay.style.opacity = "0.1";
                
                // Gradually increase color overlay
                const colorFadeInterval = setInterval(() => {
                    const currentOpacity = parseFloat(colorOverlay.style.opacity || "0");
                    if (currentOpacity < 1) {
                        colorOverlay.style.opacity = (currentOpacity + 0.05).toString();
                    } else {
                        clearInterval(colorFadeInterval);
                    }
                }, 50);
                
                // Show logo with zoom-in effect at 1.5s
                setTimeout(() => {
                    logoOverlay.classList.add("visible");
                }, 500);
                
                // Completely hide tunnel at 3.0s 
                setTimeout(() => {
                    cleanupTunnel();
                    colorOverlay.style.backgroundColor = "#021851";
                }, 2000);
                
                // Start fading out sound at 3.5s
                setTimeout(() => {
                    fadeAudio(cinematicWhip, 0, 500);
                }, 2500);
                
                // Start fading out logo at 4.0s
                setTimeout(() => {
                    logoOverlay.classList.add("fade-out");
                }, 3000);
                
                // Redirect at 4.5s
                setTimeout(() => {
                    window.location.href = translations[currentLang].url;
                }, 3500);
            }, 1000);
        }

        // Language Toggle Logic
        const translations = {
            es: {
                title: "BIENVENIDO AL<br>FUTURO DEL RETAIL",
                desc: "Una nueva forma de conectar con tus visitantes, transformar su experiencia y abrir oportunidades más allá del espacio físico.<br>Lo que hoy es un mall, mañana puede ser mucho más.",
                btn: "ACCEDER AHORA",
                credits: "Desarrollado con 💖 por Bebell Digital Solutions",
                url: "https://bebell-digital-solutions.github.io/ai-automation/es-demo" // Replace with your Spanish URL
            },
            en: {
                title: "WELCOME TO THE<br>FUTURE OF RETAIL",
                desc: "A new way to connect with your visitors, transform their experience, and open up opportunities beyond the physical space.<br>What is a mall today, can be much more tomorrow.",
                btn: "ENTER NOW",
                credits: "Powered with 💖 by Bebell Digital Solutions",
                url: "https://bebell-digital-solutions.github.io/ai-automation/en-demo" // Replace with your English URL
            }
        };

        let currentLang = 'es';
        const langToggleBtn = document.getElementById('langToggle');
        const mainTitle = document.getElementById('mainTitle');
        const mainDesc = document.getElementById('mainDesc');
        const mainCredits = document.getElementById('mainCredits');

        langToggleBtn.addEventListener('click', () => {
            currentLang = currentLang === 'es' ? 'en' : 'es';
            mainTitle.innerHTML = translations[currentLang].title;
            mainDesc.innerHTML = translations[currentLang].desc;
            button.innerHTML = translations[currentLang].btn; 
            mainCredits.innerHTML = translations[currentLang].credits;
        });

        // Three.js Tunnel Animation
        function initTunnel() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // Renderer with updated #021851 background color
            renderer = new THREE.WebGLRenderer({
                canvas: canvasTunnel,
                antialias: true,
                alpha: false // Changed to false to fill the background
            });
            renderer.setSize(w, h);
            renderer.setClearColor(0x021851, 1); // Exact dark blue background requested
            
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x021851, 0.005); // Match fog to the new background
            
            // Camera
            camera = new THREE.PerspectiveCamera(60, w / h, 0.1, 1000);
            
            // Create circular path
            const path = createCircularPath();
            
            // Tube geometry
            const tubeGeometry = new THREE.TubeGeometry(path, 200, 3, 12, false);
            
            // Tube material
            const material = new THREE.MeshBasicMaterial({
                side: THREE.BackSide,
                wireframe: true,
                color: 0x016fe9,
                transparent: true,
                opacity: 0.8
            });
            
            // Tube mesh
            tube = new THREE.Mesh(tubeGeometry, material);
            scene.add(tube);
            
            // Stars
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({
                color: 0xffffff,
                size: 1,
                transparent: true
            });
            
            const starsPositions = new Float32Array(2000 * 3);
            for (let i = 0; i < 2000; i++) {
                starsPositions[i * 3] = (Math.random() - 0.5) * 2000;
                starsPositions[i * 3 + 1] = (Math.random() - 0.5) * 2000;
                starsPositions[i * 3 + 2] = (Math.random() - 0.5) * 2000;
            }
            
            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
            stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);
            
            // Animation variables
            let pct = 0;
            const duration = 2.5; 
            const startTime = Date.now();
            
            // Animation loop
            function animate() {
                const elapsed = (Date.now() - startTime) / 1000;
                pct = Math.min(elapsed / duration, 1);
                
                // Move camera along path
                const lookAheadPct = Math.min(pct + 0.01, 1);
                const pt1 = path.getPointAt(pct);
                const pt2 = path.getPointAt(lookAheadPct);
                
                camera.position.set(pt1.x, pt1.y, pt1.z);
                camera.lookAt(pt2);
                
                // Render
                renderer.render(scene, camera);
                
                // Continue animation until complete
                if (pct < 1) {
                    animationId = requestAnimationFrame(animate);
                }
            }
            
            animate();
            
            // Handle window resize
            window.addEventListener('resize', () => {
                const w = window.innerWidth;
                const h = window.innerHeight;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h);
            });
        }

        // Clean up Three.js resources
        function cleanupTunnel() {
            if (animationId) cancelAnimationFrame(animationId);
            if (renderer) renderer.dispose();
            if (scene) {
                while(scene.children.length > 0){ 
                    scene.remove(scene.children[0]); 
                }
            }
            if (canvasTunnel) canvasTunnel.style.display = "none";
        }

        // Create circular path for tunnel
        function createCircularPath() {
            const points = [];
            const curve = new THREE.CatmullRomCurve3([
                new THREE.Vector3(0, 0, 0),
                new THREE.Vector3(20, 10, -50),
                new THREE.Vector3(40, -10, -100),
                new THREE.Vector3(60, 15, -150),
                new THREE.Vector3(50, -5, -200),
                new THREE.Vector3(0, 0, -250),
                new THREE.Vector3(-100, 0, -200),
                new THREE.Vector3(-150, 0, -100),
                new THREE.Vector3(-100, 0, 0),
                new THREE.Vector3(-50, 10, 100),
                new THREE.Vector3(-20, -10, 150),
                new THREE.Vector3(0, 0, 200)
            ]);
            
            curve.tension = 0.1;
            
            for (let i = 0; i < 200; i++) {
                const t = i / 199;
                points.push(curve.getPointAt(t));
            }
            return curve;
        }
    </script>
</body>
</html>
