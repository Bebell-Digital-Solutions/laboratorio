
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Cotización</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            /* Change this hex code to match your brand color */
            --color-highlight: #6366f1; 
        }

        #isolated-carousel { all: initial; display: block; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; box-sizing: border-box; max-width: 1200px; margin: 0 auto; width: 100%; }
        #isolated-carousel .carousel-container { width: 100%; position: relative; overflow: hidden; border-radius: 20px; padding: 20px; background: transparent; box-sizing: border-box; }
        #isolated-carousel .carousel-track { display: flex; transition: transform 0.5s ease; height: 100%; justify-content: flex-start; box-sizing: border-box; }
        #isolated-carousel .slide { flex: 0 0 calc(33.3333% - 10px); margin: 0 5px; box-sizing: border-box; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; padding: 10px; border-radius: 20px; aspect-ratio: 9/16; height: auto; max-height: 80vh; background: transparent; }
        #isolated-carousel .slide img, #isolated-carousel .slide video { width: 100%; height: 100%; object-fit: cover; border-radius: 20px; max-width: 100%; display: block; }
        #isolated-carousel .slide video { background-color: #000; background-size: cover; background-position: center; background-repeat: no-repeat; }
        #isolated-carousel .video-container { position: relative; width: 100%; height: 100%; cursor: pointer; border-radius: 20px; background: transparent; }
        #isolated-carousel .play-button { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60px; height: 60px; background: rgba(0,0,0,0.7); border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; transition: transform 0.2s; border: none; padding: 0; }
        #isolated-carousel .play-button:hover { transform: translate(-50%, -50%) scale(1.1); }
        #isolated-carousel .play-button::after { content: "▶"; color: white; font-size: 24px; display: block; }
        #isolated-carousel video::-webkit-media-controls-overlay-play-button, #isolated-carousel video::-webkit-media-controls-download-button, #isolated-carousel video::-webkit-media-controls-picture-in-picture-button, #isolated-carousel video::-webkit-media-controls-fullscreen-button { display: none !important; }
        #isolated-carousel .arrow { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.7); border: none; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #341d10; font-size: 24px; z-index: 10; transition: transform 0.2s; }
        #isolated-carousel .arrow:hover { transform: translateY(-50%) scale(1.1); }
        #isolated-carousel .arrow.prev { left: 15px; }
        #isolated-carousel .arrow.next { right: 15px; }
        
        @media (max-width: 768px) { 
            #isolated-carousel .carousel-container { padding: 10px; } 
            #isolated-carousel .slide { flex: 0 0 calc(100% - 10px); margin: 5px; max-height: 90vh; } 
            #isolated-carousel .play-button { width: 50px; height: 50px; } 
            #isolated-carousel video[poster] { background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important; } 
            #isolated-carousel video:not(.playing) { background-image: var(--poster-url) !important; } 
        }
        @media (min-width: 769px) { #isolated-carousel .play-button { display: none; } #isolated-carousel video { autoplay: true; loop: true; } }
    </style>
    <script>tailwind.config = { theme: { extend: { colors: { highlight: 'var(--color-highlight)', sidebar: '#1e293b' } } } }</script>
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col">
    <!-- Header Section -->
    <div class="w-full h-64 bg-[url('https://images.unsplash.com/photo-1454165804606-c3d57bc86b40?q=80&w=2070&auto=format&fit=crop')] bg-cover bg-center relative shrink-0">
        <div class="absolute inset-0 bg-sidebar/80 mix-blend-multiply"></div>
        <div class="absolute inset-0 bg-gradient-to-t from-gray-50 to-transparent"></div>
        <div class="absolute inset-0 flex flex-col items-center justify-center text-center p-6 mb-8">
            <h2 class="text-4xl font-extrabold text-white mb-3">Solicitar Cotización</h2>
            <p class="text-white/80 max-w-2xl text-lg font-medium">Cuéntanos sobre tu proyecto y requerimientos.</p>
        </div>
    </div>
    
    <!-- Main Content -->
    <div class="flex-1 px-6 pb-10 flex flex-col items-center relative z-10 -mt-16">
        <!-- Form Placeholder / Embed Area -->
        <div class="bg-white rounded-2xl shadow-xl border border-gray-100 w-full max-w-4xl p-8 mb-8 text-center">
            <div class="w-full min-h-[400px] border-2 border-dashed border-gray-300 rounded-xl bg-gray-50 flex flex-col items-center justify-center p-8">
                <i data-lucide="code-2" class="w-12 h-12 text-highlight mb-4"></i>
                <h3 class="text-xl font-bold text-gray-700 mb-2">Área de Formulario</h3>
                <p class="text-gray-500 max-w-md">Pega aquí tu código de incrustación (Typeform, Google Forms, etc.)</p>
            </div>
        </div>
        
        <!-- Video Showcase Carousel -->
        <div id="isolated-carousel" class="w-full max-w-4xl">
            <div class="carousel-container">
                <div class="carousel-track">
                    <!-- Slides with Video assets -->
                    <div class="slide"><img src="https://bucket.mlcdn.com/a/3336/3336910/images/88e640e5d362824bb9074203bc5e751db8df6d18.jpeg" alt="Slide 1"></div>
                    <div class="slide">
                        <div class="video-container">
                            <video controls muted playsinline preload="none" poster="https://bucket.mlcdn.com/a/3336/3336910/images/fc82307ad5183b1e9ea4416e357a53ca1a3b332c.png">
                                <source src="https://cdn.shopify.com/videos/c/o/v/80f8991df12c4d8fbf807edb482f0979.mp4" type="video/mp4">
                            </video>
                            <button class="play-button"></button>
                        </div>
                    </div>
                    <div class="slide"><img src="https://bucket.mlcdn.com/a/3336/3336910/images/75ac2807f828dfd323ee0a8f1a5712719e9fa71f.jpeg" alt="Slide 2"></div>
                    <div class="slide">
                        <div class="video-container">
                            <video controls muted playsinline preload="none" poster="https://bucket.mlcdn.com/a/3336/3336910/images/5a53647516b281fe11e291fe7830a79f00d9f02d.png">
                                <source src="https://cdn.shopify.com/videos/c/o/v/a3bae82789a64a1ba42192ec81f1a5da.mp4" type="video/mp4">
                            </video>
                            <button class="play-button"></button>
                        </div>
                    </div>
                </div>
                <button class="arrow prev">❮</button>
                <button class="arrow next">❯</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        (function() {
            const carousel = document.getElementById('isolated-carousel');
            const track = carousel.querySelector('.carousel-track');
            const slides = carousel.querySelectorAll('.slide');
            const nextBtn = carousel.querySelector('.next');
            const prevBtn = carousel.querySelector('.prev');
            let currentIndex = 0;

            function updateSlide() {
                const slidesToShow = window.innerWidth < 769 ? 1 : 3;
                const slideWidth = slides[0].clientWidth + 10;
                track.style.transform = `translateX(-${currentIndex * slideWidth}px)`;
            }

            nextBtn.addEventListener('click', () => {
                const slidesToShow = window.innerWidth < 769 ? 1 : 3;
                currentIndex = (currentIndex + slidesToShow >= slides.length) ? 0 : currentIndex + slidesToShow;
                updateSlide();
            });

            prevBtn.addEventListener('click', () => {
                const slidesToShow = window.innerWidth < 769 ? 1 : 3;
                currentIndex = (currentIndex - slidesToShow < 0) ? slides.length - slidesToShow : currentIndex - slidesToShow;
                updateSlide();
            });

            window.addEventListener('resize', updateSlide);
        })();
    </script>
</body>
</html>
